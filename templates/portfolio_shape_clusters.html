<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Похожесть графиков · кластеры</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e2e8f0; margin: 0; padding: 1rem; max-width: 1100px; margin-left: auto; margin-right: auto; }
        a { color: #7dd3fc; }
        h1 { font-size: 1.15rem; margin: 0.5rem 0 0.35rem; }
        .muted { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.75rem; line-height: 1.35; }
        select, button { background: #0f3460; color: #e2e8f0; border: 1px solid #334155; padding: 0.35rem 0.6rem; border-radius: 6px; margin-right: 0.4rem; }
        .controls { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; margin-bottom: 0.75rem; }
        #metaLine { font-size: 0.78rem; color: #64748b; margin-bottom: 0.75rem; }
        #statusLine { font-size: 0.8rem; color: #94a3b8; min-height: 1.2em; margin: 0.5rem 0; }
        #clusterBoard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.65rem;
            margin: 0.75rem 0 1.25rem;
        }
        .cluster-card {
            background: #12182a;
            border: 1px solid #334155;
            border-left-width: 5px;
            border-radius: 10px;
            padding: 0.7rem 0.75rem;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
        }
        .cluster-card:hover { background: #16213e; transform: translateY(-1px); }
        .cluster-card.active { border-color: #38bdf8; background: #0f3460; box-shadow: 0 0 0 1px #38bdf8; }
        .cluster-card .title { font-weight: 650; font-size: 0.92rem; margin-bottom: 0.2rem; }
        .cluster-card .meta { font-size: 0.72rem; color: #94a3b8; margin-bottom: 0.45rem; }
        .cluster-card .tickers { display: flex; flex-wrap: wrap; gap: 0.25rem; }
        .cluster-card .tickers span {
            font-size: 0.7rem; background: #1a1a2e; border: 1px solid #334155;
            border-radius: 999px; padding: 0.1rem 0.4rem; color: #cbd5e1;
        }
        .cluster-card .tickers span.medoid { border-color: #38bdf8; color: #7dd3fc; }
        #detailHead { font-size: 1rem; margin: 1rem 0 0.35rem; color: #e2e8f0; display: none; }
        .chart-section { position: relative; height: 280px; margin-top: 1rem; }
        .chart-section.overlay { height: 340px; }
        .chart-section h2 { font-size: 0.95rem; margin: 0 0 0.35rem 0; color: #cbd5e1; }
        .pair { color: #94a3b8; font-size: 0.78rem; margin-top: 0.25rem; }
    </style>
    {% include "partials/lse_fetch_shim.html" %}
</head>
<body>
{% include "partials/site_nav_standalone.html" %}
    <h1>Похожесть графиков · кластеры</h1>
    <p class="muted">Сначала рисуем <strong>группы</strong> (форма 6м-цены). Клик по карточке кластера → оверлей нормированных кривых и дневные графики членов группы.</p>

    <div class="controls">
        <label>Lookback
            <select id="lookbackSel">
                <option value="63">63д</option>
                <option value="126" selected>126д (~6м)</option>
                <option value="189">189д</option>
            </select>
        </label>
        <label>Групп ~
            <select id="maxClustersSel">
                <option value="6">6</option>
                <option value="8" selected>8</option>
                <option value="10">10</option>
                <option value="12">12</option>
            </select>
        </label>
        <label>Дней графика
            <select id="daysSel">
                <option value="90">90</option>
                <option value="180" selected>180</option>
                <option value="270">270</option>
            </select>
        </label>
        <button type="button" id="reloadBtn">Пересчитать карту</button>
    </div>

    <div id="metaLine"></div>
    <div id="clusterBoard"></div>
    <div id="statusLine">Загрузка карты кластеров…</div>
    <h2 id="detailHead"></h2>
    <div id="chartsRoot"></div>

    <script>
        var chartInstances = [];
        var currentClusterId = null;
        var lastReport = null;
        var COLORS = ['#38bdf8','#4ade80','#fbbf24','#f472b6','#a78bfa','#fb923c','#22d3ee','#e879f9','#86efac','#f87171','#c084fc','#2dd4bf'];

        function destroyCharts() {
            chartInstances.forEach(function(ch) { try { ch.destroy(); } catch (e) {} });
            chartInstances = [];
        }

        function colorFor(i) { return COLORS[i % COLORS.length]; }

        async function fetchJsonTimeout(url, ms) {
            var ctrl = new AbortController();
            var timer = setTimeout(function() { ctrl.abort(); }, ms || 20000);
            try {
                var r = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
                clearTimeout(timer);
                return r;
            } catch (e) {
                clearTimeout(timer);
                throw e;
            }
        }

        function buildOverlayChart(canvas, overlay) {
            var labels = overlay.labels || [];
            var series = overlay.series || [];
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: series.map(function(s, i) {
                        return {
                            label: s.ticker,
                            data: s.values || [],
                            borderColor: colorFor(i),
                            tension: 0.1,
                            spanGaps: true,
                            pointRadius: 0,
                            borderWidth: 1.6
                        };
                    })
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: 'Норм. цена (1.0 = старт lookback)', color: '#94a3b8', font: { size: 11 } },
                        legend: { labels: { color: '#cbd5e1', boxWidth: 10, font: { size: 10 } } }
                    },
                    scales: {
                        x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
                        y: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function buildPriceChart(canvas, bars) {
            var labels = bars.map(function(b) { return String(b.date).slice(0, 10); });
            var closes = bars.map(function(b) { return b.close != null ? Number(b.close) : null; });
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: 'Close', data: closes, borderColor: '#38bdf8', tension: 0.1, spanGaps: true, pointRadius: 0 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#94a3b8', maxTicksLimit: 10 } },
                        y: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function renderBoard(clusters) {
            var board = document.getElementById('clusterBoard');
            board.innerHTML = '';
            (clusters || []).forEach(function(c, idx) {
                var card = document.createElement('div');
                card.className = 'cluster-card' + (Number(c.cluster_id) === Number(currentClusterId) ? ' active' : '');
                card.style.borderLeftColor = colorFor(idx);
                card.dataset.clusterId = String(c.cluster_id);

                var title = document.createElement('div');
                title.className = 'title';
                title.textContent = c.label || ('C' + c.cluster_id);

                var meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = (c.size || 0) + ' тикер(ов) · клик → графики';

                var ticks = document.createElement('div');
                ticks.className = 'tickers';
                (c.tickers || []).forEach(function(t) {
                    var s = document.createElement('span');
                    if (t === c.medoid) s.className = 'medoid';
                    s.textContent = t;
                    ticks.appendChild(s);
                });

                card.appendChild(title);
                card.appendChild(meta);
                card.appendChild(ticks);

                var pairs = (c.strong_pairs || []).map(function(p) {
                    return p.a + '–' + p.b + ' (' + p.corr + ')';
                }).join(' · ');
                if (pairs) {
                    var pEl = document.createElement('div');
                    pEl.className = 'pair';
                    pEl.textContent = pairs;
                    card.appendChild(pEl);
                }

                card.addEventListener('click', function() {
                    selectCluster(Number(c.cluster_id));
                });
                board.appendChild(card);
            });
        }

        function markActiveCard() {
            Array.prototype.forEach.call(document.querySelectorAll('.cluster-card'), function(card) {
                if (Number(card.dataset.clusterId) === Number(currentClusterId)) card.classList.add('active');
                else card.classList.remove('active');
            });
        }

        async function loadPriceChartsBatched(tickers, days) {
            var statusEl = document.getElementById('statusLine');
            var root = document.getElementById('chartsRoot');
            var batchSize = 6;
            var loaded = 0;
            for (var i = 0; i < tickers.length; i += batchSize) {
                var batch = tickers.slice(i, i + batchSize);
                statusEl.textContent = 'Дневные ' + (loaded + 1) + '–' +
                    Math.min(loaded + batch.length, tickers.length) + ' / ' + tickers.length;
                var cr = await fetchJsonTimeout(
                    '/api/portfolio/shape-clusters/charts?days=' + encodeURIComponent(days) +
                    '&tickers=' + encodeURIComponent(batch.join(',')),
                    30000
                );
                if (!cr.ok) {
                    statusEl.textContent += ' · ошибка ' + cr.status;
                    return;
                }
                var pack = await cr.json();
                (pack.charts || []).forEach(function(item) {
                    var sec = document.createElement('div');
                    sec.className = 'chart-section';
                    var h = document.createElement('h2');
                    h.textContent = item.ticker || '—';
                    var cv = document.createElement('canvas');
                    sec.appendChild(h);
                    sec.appendChild(cv);
                    root.appendChild(sec);
                    if (!(item.bars || []).length) {
                        var miss = document.createElement('p');
                        miss.className = 'muted';
                        miss.textContent = 'Нет quotes';
                        sec.appendChild(miss);
                        return;
                    }
                    chartInstances.push(buildPriceChart(cv, item.bars));
                });
                loaded += batch.length;
            }
            statusEl.textContent = 'Готово · ' + tickers.length + ' графиков';
        }

        async function selectCluster(clusterId) {
            currentClusterId = clusterId;
            markActiveCard();
            var statusEl = document.getElementById('statusLine');
            var root = document.getElementById('chartsRoot');
            var head = document.getElementById('detailHead');
            var lookback = document.getElementById('lookbackSel').value;
            var maxCl = document.getElementById('maxClustersSel').value;
            var days = document.getElementById('daysSel').value;

            destroyCharts();
            root.innerHTML = '';

            var selected = null;
            ((lastReport && lastReport.clusters) || []).forEach(function(c) {
                if (Number(c.cluster_id) === Number(clusterId)) selected = c;
            });
            if (!selected) {
                statusEl.textContent = 'Кластер не найден';
                return;
            }

            head.style.display = 'block';
            head.textContent = 'Графики · ' + (selected.label || '') + ' · ' + (selected.tickers || []).join(', ');
            statusEl.textContent = 'Оверлей формы…';
            head.scrollIntoView({ behavior: 'smooth', block: 'start' });

            var ovSec = document.createElement('div');
            ovSec.className = 'chart-section overlay';
            var ovH = document.createElement('h2');
            ovH.textContent = 'Оверлей формы';
            var ovCv = document.createElement('canvas');
            ovSec.appendChild(ovH);
            ovSec.appendChild(ovCv);
            root.appendChild(ovSec);

            try {
                var qOv = '/api/portfolio/shape-clusters?lookback_days=' + encodeURIComponent(lookback) +
                    '&max_clusters=' + encodeURIComponent(maxCl) +
                    '&method=hierarchical&mode=shape&include_overlay=1' +
                    '&cluster_id=' + encodeURIComponent(clusterId);
                var rOv = await fetchJsonTimeout(qOv, 25000);
                if (rOv.ok) {
                    var withOv = await rOv.json();
                    var overlay = withOv.overlay || { labels: [], series: [] };
                    if ((overlay.series || []).length) {
                        chartInstances.push(buildOverlayChart(ovCv, overlay));
                    } else {
                        ovH.textContent = 'Оверлей формы (нет overlapping ряда)';
                    }
                }
            } catch (e) {
                ovH.textContent = 'Оверлей не загрузился — дневные ниже';
            }

            await loadPriceChartsBatched(selected.tickers || [], days);
        }

        async function loadBoard() {
            var statusEl = document.getElementById('statusLine');
            var head = document.getElementById('detailHead');
            var root = document.getElementById('chartsRoot');
            var lookback = document.getElementById('lookbackSel').value;
            var maxCl = document.getElementById('maxClustersSel').value;
            currentClusterId = null;
            destroyCharts();
            root.innerHTML = '';
            head.style.display = 'none';
            statusEl.textContent = 'Рисуем карту кластеров…';

            try {
                var q = '/api/portfolio/shape-clusters?lookback_days=' + encodeURIComponent(lookback) +
                    '&max_clusters=' + encodeURIComponent(maxCl) +
                    '&method=hierarchical&mode=shape&include_overlay=0';
                var r = await fetchJsonTimeout(q, 25000);
                if (!r.ok) {
                    var err = await r.json().catch(function() { return {}; });
                    statusEl.textContent = err.detail || r.statusText;
                    return;
                }
                var report = await r.json();
                lastReport = report;
                renderBoard(report.clusters || []);
                document.getElementById('metaLine').textContent =
                    'ok=' + (report.n_tickers_ok || 0) + '/' + (report.n_tickers_requested || 0) +
                    ' · clusters=' + (report.n_clusters || 0) +
                    ' · method=' + (report.method || '') +
                    ' · max≈' + (report.max_clusters || maxCl) +
                    (report.cache_hit ? ' · cache' : '') +
                    ' · кликните карточку группы';
                statusEl.textContent = 'Карта готова — выберите кластер';
            } catch (e) {
                var msg = (e && e.name === 'AbortError')
                    ? 'Таймаут карты кластеров. Обновите страницу.'
                    : ('Ошибка: ' + (e.message || String(e)));
                statusEl.textContent = msg;
            }
        }

        document.getElementById('reloadBtn').addEventListener('click', loadBoard);
        document.getElementById('lookbackSel').addEventListener('change', loadBoard);
        document.getElementById('maxClustersSel').addEventListener('change', loadBoard);
        loadBoard();
    </script>
</body>
</html>
