<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Сравнить на глаз · форма</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e2e8f0; margin: 0; padding: 1rem; max-width: 1100px; margin-left: auto; margin-right: auto; }
        a { color: #7dd3fc; }
        h1 { font-size: 1.15rem; margin: 0.5rem 0 0.35rem; }
        .muted { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.75rem; line-height: 1.35; }
        select, button { background: #0f3460; color: #e2e8f0; border: 1px solid #334155; padding: 0.35rem 0.6rem; border-radius: 6px; margin-right: 0.4rem; }
        .controls { display: flex; flex-wrap: wrap; gap: 0.65rem 1rem; align-items: center; margin-bottom: 0.75rem; }
        .controls label { font-size: 0.82rem; color: #cbd5e1; display: inline-flex; align-items: center; gap: 0.35rem; }
        #statusLine { font-size: 0.8rem; color: #94a3b8; min-height: 1.2em; margin: 0.5rem 0; }
        #metaLine { font-size: 0.78rem; color: #64748b; margin-bottom: 0.75rem; }
        .compare-row { display: flex; flex-wrap: wrap; gap: 0.5rem 0.65rem; align-items: center; margin-bottom: 0.75rem; }
        .compare-row select { min-width: 6.5rem; }
        .chart-section { margin-top: 1rem; background: #12182a; border: 1px solid #334155; border-radius: 10px; padding: 0.6rem 0.75rem; }
        .chart-section h2 { font-size: 0.9rem; margin: 0 0 0.35rem 0; color: #cbd5e1; }
        .spark { width: 100%; height: 180px; display: block; background: #0b1020; border-radius: 6px; }
        .ov-legend { display: flex; flex-wrap: wrap; gap: 0.35rem 0.65rem; margin-top: 0.45rem; }
        .ov-legend span { font-size: 0.72rem; color: #cbd5e1; display: inline-flex; align-items: center; gap: 0.3rem; }
        .ov-legend i { display: inline-block; width: 12px; height: 3px; border-radius: 1px; }
        .pair { color: #94a3b8; font-size: 0.78rem; margin-top: 0.45rem; }
        .method-inline {
            font-size: 0.75rem; color: #94a3b8; margin: 0 0 0.65rem; line-height: 1.35;
            padding: 0.45rem 0.6rem; background: #0b1020; border-left: 3px solid #38bdf8; border-radius: 0 6px 6px 0;
        }
        .tabs { display: flex; gap: 0.75rem; margin: 0.35rem 0 0.85rem; font-size: 0.9rem; }
        .tabs a { text-decoration: none; color: #94a3b8; border-bottom: 2px solid transparent; padding-bottom: 0.15rem; }
        .tabs a.active { color: #7dd3fc; border-bottom-color: #38bdf8; font-weight: 650; }
    </style>
    {% include "partials/lse_fetch_shim.html" %}
</head>
<body>
{% include "partials/site_nav_standalone.html" %}
    <h1>Похожесть графиков · сравнить</h1>
    <div class="tabs">
        <a href="/portfolio/shape-clusters">Кластеры</a>
        <a class="active" href="/portfolio/shape-compare">На глаз</a>
    </div>
    <p class="muted">2–3 тикера → оверлей + Pearson. Ряды только для выбранных.</p>
    <div class="method-inline">P=close/close_first, Pearson (не cosine). d=1-corr.</div>

    <div class="controls">
        <label>Окно
            <select id="lookbackSel">
                <option value="63">63д</option>
                <option value="126" selected>126д (~6м)</option>
                <option value="189">189д</option>
            </select>
        </label>
        <button type="button" id="reloadBtn">Обновить выбранные</button>
    </div>
    <div id="metaLine"></div>
    <div id="statusLine">html</div>
    <script>
    (function () {
        var el = document.getElementById("statusLine");
        function st(m) { try { el.textContent = m; } catch (e) {} }
        st("html-ok");
        var s = document.createElement("script");
        s.src = "/static/js/portfolio_shape_compare_page.js?v=20260715c";
        s.async = false;
        s.onload = function () {
            if (el && String(el.textContent || "").indexOf("loading app.js") === 0) {
                st("app.js loaded");
            }
        };
        s.onerror = function () { st("app.js FAIL - hard reload"); };
        st("loading app.js...");
        document.body.appendChild(s);
    })();
    </script>

    <div class="compare-row">
        <label>A
            <select id="cmpA">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <label>B
            <select id="cmpB">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <label>C
            <select id="cmpC">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <button type="button" id="cmpBtn">Оверлей</button>
        <button type="button" id="cmpClearBtn">Сброс</button>
    </div>
    <div id="compareRoot"></div>
</body>
</html>
