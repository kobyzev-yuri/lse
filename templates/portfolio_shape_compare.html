<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Сравнить на глаз · форма</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e2e8f0; margin: 0; padding: 1rem; max-width: 1100px; margin-left: auto; margin-right: auto; }
        a { color: #7dd3fc; }
        h1 { font-size: 1.15rem; margin: 0.5rem 0 0.35rem; }
        .muted { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.75rem; line-height: 1.35; }
        select, button { background: #0f3460; color: #e2e8f0; border: 1px solid #334155; padding: 0.35rem 0.6rem; border-radius: 6px; margin-right: 0.4rem; }
        .controls { display: flex; flex-wrap: wrap; gap: 0.65rem 1rem; align-items: center; margin-bottom: 0.75rem; }
        .controls label { font-size: 0.82rem; color: #cbd5e1; display: inline-flex; align-items: center; gap: 0.35rem; }
        #statusLine { font-size: 0.8rem; color: #94a3b8; min-height: 1.2em; margin: 0.5rem 0; }
        #metaLine { font-size: 0.78rem; color: #64748b; margin-bottom: 0.75rem; }
        .compare-row { display: flex; flex-wrap: wrap; gap: 0.5rem 0.65rem; align-items: center; margin-bottom: 0.75rem; }
        .compare-row select { min-width: 6.5rem; }
        .chart-section { margin-top: 1rem; background: #12182a; border: 1px solid #334155; border-radius: 10px; padding: 0.6rem 0.75rem; }
        .chart-section h2 { font-size: 0.9rem; margin: 0 0 0.35rem 0; color: #cbd5e1; }
        .spark { width: 100%; height: 180px; display: block; background: #0b1020; border-radius: 6px; }
        .ov-legend { display: flex; flex-wrap: wrap; gap: 0.35rem 0.65rem; margin-top: 0.45rem; }
        .ov-legend span { font-size: 0.72rem; color: #cbd5e1; display: inline-flex; align-items: center; gap: 0.3rem; }
        .ov-legend i { display: inline-block; width: 12px; height: 3px; border-radius: 1px; }
        .tabs { display: flex; gap: 0.75rem; margin: 0.35rem 0 0.85rem; font-size: 0.9rem; }
        .tabs a { text-decoration: none; color: #94a3b8; border-bottom: 2px solid transparent; padding-bottom: 0.15rem; }
        .tabs a.active { color: #7dd3fc; border-bottom-color: #38bdf8; font-weight: 650; }
    </style>
    {% include "partials/lse_fetch_shim.html" %}
</head>
<body>
{% include "partials/site_nav_standalone.html" %}
    <h1>Похожесть графиков · сравнить</h1>
    <div class="tabs">
        <a href="/portfolio/shape-clusters">Кластеры</a>
        <a class="active" href="/portfolio/shape-compare">На глаз</a>
    </div>
    <p class="muted">2–3 тикера из списка анализа → нормированный оверлей. Ряды уже в странице (без второго тяжёлого fetch).</p>

    <div class="controls">
        <label>Окно
            <select id="lookbackSel">
                <option value="63">63д</option>
                <option value="126" selected>126д (~6м)</option>
                <option value="189">189д</option>
            </select>
        </label>
        <button type="button" id="reloadBtn">Обновить выбранные</button>
    </div>
    <div id="metaLine"></div>
    <div id="statusLine">boot</div>

    <div class="compare-row">
        <label>A
            <select id="cmpA">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <label>B
            <select id="cmpB">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <label>C
            <select id="cmpC">
                <option value="">—</option>
                {% for t in shape_tickers or [] %}<option value="{{ t }}">{{ t }}</option>{% endfor %}
            </select>
        </label>
        <button type="button" id="cmpBtn">Оверлей</button>
        <button type="button" id="cmpClearBtn">Сброс</button>
    </div>
    <div id="compareRoot"></div>

    <script>
    (function () {
        var COLORS = ["#38bdf8", "#4ade80", "#fbbf24", "#f472b6", "#a78bfa", "#fb923c", "#22d3ee", "#e879f9", "#86efac", "#f87171", "#c084fc", "#2dd4bf"];
        var sparkCloses = {{ (spark_closes or {}) | tojson }};
        var stEl = document.getElementById("statusLine");
        var metaEl = document.getElementById("metaLine");
        function st(m) { try { if (stEl) stEl.textContent = String(m); } catch (e0) {} }
        function colorFor(i) { return COLORS[i % COLORS.length]; }
        st("js-0 sparks=" + Object.keys(sparkCloses || {}).length);
        if (metaEl) {
            metaEl.textContent = "boot sparks=" + Object.keys(sparkCloses || {}).length + " (embedded)";
        }

        function fetchJson(url, ms) {
            ms = ms || 20000;
            var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
            var timedOut = false;
            var timer = setTimeout(function () {
                timedOut = true;
                try { if (ctrl) ctrl.abort(); } catch (e0) {}
            }, ms);
            var opts = { cache: "no-store" };
            if (ctrl) opts.signal = ctrl.signal;
            return fetch(url, opts).then(function (r) {
                return r.json().then(function (body) {
                    clearTimeout(timer);
                    return { ok: r.ok, status: r.status, body: body };
                }, function () {
                    clearTimeout(timer);
                    return { ok: r.ok, status: r.status, body: {} };
                });
            }).catch(function (e) {
                clearTimeout(timer);
                if (e && e.name === "AbortError") {
                    throw new Error(timedOut ? ("timeout " + ms + "ms") : "aborted");
                }
                throw new Error(e && e.message ? e.message : String(e));
            });
        }

        function sparkSvg(seriesList) {
            var w = 640, h = 180, pad = 8, n = 0;
            seriesList.forEach(function (s) {
                if ((s.values || []).length > n) n = s.values.length;
            });
            if (n < 2) return "<svg class='spark' viewBox='0 0 " + w + " " + h + "'></svg>";
            var ymin = Infinity, ymax = -Infinity;
            seriesList.forEach(function (s) {
                (s.values || []).forEach(function (v) {
                    if (v == null || !isFinite(v)) return;
                    if (v < ymin) ymin = v;
                    if (v > ymax) ymax = v;
                });
            });
            if (!isFinite(ymin) || !isFinite(ymax) || ymin === ymax) { ymin = 0; ymax = 1; }
            var paths = seriesList.map(function (s, idx) {
                var stroke = s.color || colorFor(idx);
                var pts = [];
                (s.values || []).forEach(function (v, i) {
                    if (v == null || !isFinite(v)) return;
                    var x = pad + (i / (n - 1)) * (w - 2 * pad);
                    var y = h - pad - ((v - ymin) / (ymax - ymin)) * (h - 2 * pad);
                    pts.push(x.toFixed(1) + "," + y.toFixed(1));
                });
                if (pts.length < 2) return "";
                return "<polyline fill='none' stroke='" + stroke + "' stroke-width='1.8' points='" + pts.join(" ") + "'/>";
            }).join("");
            return "<svg class='spark' viewBox='0 0 " + w + " " + h + "' preserveAspectRatio='none'>" + paths + "</svg>";
        }

        function legendHtml(seriesList) {
            return "<div class='ov-legend'>" + seriesList.map(function (s) {
                return "<span><i style='background:" + (s.color || colorFor(0)) + "'></i>" + (s.ticker || "?") + "</span>";
            }).join("") + "</div>";
        }

        function normCloses(closes) {
            var out = [], first = null;
            (closes || []).forEach(function (c0) {
                var c = Number(c0);
                if (!isFinite(c) || c <= 0) { out.push(null); return; }
                if (first == null) first = c;
                out.push(c / first);
            });
            return out;
        }

        function picked() {
            var picks = ["cmpA", "cmpB", "cmpC"].map(function (id) {
                var el = document.getElementById(id);
                return el ? String(el.value || "").toUpperCase() : "";
            }).filter(Boolean);
            var seen = {};
            return picks.filter(function (t) {
                if (seen[t]) return false;
                seen[t] = true;
                return true;
            }).slice(0, 3);
        }

        function paintOverlay() {
            var root = document.getElementById("compareRoot");
            if (!root) return;
            var picks = picked();
            if (picks.length < 2) {
                root.innerHTML = "<p class='muted'>Select at least 2 tickers.</p>";
                return;
            }
            var series = [], miss = [];
            picks.forEach(function (t, idx) {
                var closes = sparkCloses[t];
                if (!closes || !closes.length) { miss.push(t); return; }
                var vals = normCloses(closes);
                if (vals.length < 2) { miss.push(t); return; }
                series.push({ ticker: t, values: vals, color: colorFor(idx) });
            });
            if (series.length < 2) {
                root.innerHTML = "<p class='muted'>No series for: " + (miss.join(", ") || "-") +
                    ". Press refresh for selected.</p>";
                return;
            }
            root.innerHTML = "<div class='chart-section'><h2>Compare (norm) · " +
                series.map(function (s) { return s.ticker; }).join(" · ") + "</h2>" +
                sparkSvg(series) + legendHtml(series) +
                (miss.length ? "<p class='muted'>missing: " + miss.join(", ") + "</p>" : "") +
                "</div>";
            st("overlay " + series.map(function (s) { return s.ticker; }).join("/"));
        }

        function refreshSelected() {
            var picks = picked();
            var lookEl = document.getElementById("lookbackSel");
            var lookback = lookEl ? lookEl.value : "126";
            if (picks.length < 1) {
                st("pick tickers first");
                return;
            }
            var url = "/api/portfolio/shape-clusters/sparks?lookback_days=" + encodeURIComponent(lookback) +
                "&tickers=" + encodeURIComponent(picks.join(","));
            st("refresh " + picks.join(",") + "...");
            fetchJson(url, 15000).then(function (pack) {
                if (!pack.ok) throw new Error((pack.body && pack.body.detail) || ("HTTP " + pack.status));
                var sc = (pack.body && pack.body.spark_closes) || {};
                Object.keys(sc).forEach(function (t) { sparkCloses[t] = sc[t]; });
                if (metaEl) {
                    metaEl.textContent = "sparks=" + Object.keys(sparkCloses).length +
                        " refreshed=" + Object.keys(sc).length;
                }
                st("refreshed " + Object.keys(sc).join(","));
                paintOverlay();
            }).catch(function (e) {
                st("refresh fail: " + (e && e.message ? e.message : String(e)) + " (using embedded)");
                paintOverlay();
            });
        }

        var reloadBtn = document.getElementById("reloadBtn");
        var cmpBtn = document.getElementById("cmpBtn");
        var cmpClearBtn = document.getElementById("cmpClearBtn");
        if (reloadBtn) reloadBtn.addEventListener("click", refreshSelected);
        if (cmpBtn) cmpBtn.addEventListener("click", paintOverlay);
        if (cmpClearBtn) {
            cmpClearBtn.addEventListener("click", function () {
                ["cmpA", "cmpB", "cmpC"].forEach(function (id) {
                    var el = document.getElementById(id);
                    if (el) el.value = "";
                });
                var root = document.getElementById("compareRoot");
                if (root) root.innerHTML = "";
                st("cleared");
            });
        }
        st("ready sparks=" + Object.keys(sparkCloses || {}).length + " - pick 2-3");
    })();
    </script>
</body>
</html>
