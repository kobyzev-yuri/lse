<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Портфель — daily график</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e2e8f0; margin: 0; padding: 1rem; max-width: 960px; margin-left: auto; margin-right: auto; }
        a { color: #7dd3fc; }
        h1 { font-size: 1.1rem; }
        .muted { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.75rem; }
        select, button { background: #0f3460; color: #e2e8f0; border: 1px solid #334155; padding: 0.35rem 0.6rem; border-radius: 6px; margin-right: 0.5rem; }
        .chart-section { position: relative; height: 300px; margin-top: 1rem; }
        .chart-section h2 { font-size: 0.95rem; margin: 0 0 0.35rem 0; color: #cbd5e1; }
        #statusLine { font-size: 0.8rem; color: #94a3b8; min-height: 1.2em; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <h1>Daily — quotes</h1>
    <p class="muted">Интервал <strong>1d</strong> из таблицы <code>quotes</code>. Поле <strong>Тикер</strong> пустое — графики по <strong>всем</strong> тикерам портфельной игры. Ссылка с карточки <code>?ticker=…</code> подставляет тикер.</p>
    <div>
        <label>Тикер <input type="text" id="tickerInput" placeholder="все" style="width:140px; padding:0.35rem;" autocomplete="off"></label>
        <label>Дней <select id="daysSel"><option value="90">90</option><option value="180" selected>180</option><option value="365">365</option></select></label>
        <button type="button" id="loadBtn">Показать</button>
        <a href="/">Дашборд</a>
        <a href="/portfolio/cards">Карточки</a>
    </div>
    <div id="statusLine"></div>
    <div id="chartsRoot"></div>
    <script>
        function qs(name) {
            var m = new RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
            return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
        }
        var chartInstances = [];

        function destroyCharts() {
            chartInstances.forEach(function(ch) { try { ch.destroy(); } catch (e) {} });
            chartInstances = [];
        }

        function buildLineChart(canvas, title, bars) {
            var labels = bars.map(function(b) { return b.date.slice(0, 10); });
            var closes = bars.map(function(b) { return b.close != null ? Number(b.close) : null; });
            var sma = bars.map(function(b) { return b.sma_5 != null ? Number(b.sma_5) : null; });
            return new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Close', data: closes, borderColor: '#38bdf8', tension: 0.1, spanGaps: true, pointRadius: 0 },
                        { label: 'SMA5', data: sma, borderColor: '#a78bfa', tension: 0.1, spanGaps: true, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        title: { display: !!title, text: title || '', color: '#94a3b8', font: { size: 11 } },
                        legend: { labels: { color: '#cbd5e1' } }
                    },
                    scales: {
                        x: { ticks: { color: '#94a3b8', maxTicksLimit: 12 } },
                        y: { ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        async function loadChart() {
            var statusEl = document.getElementById('statusLine');
            var root = document.getElementById('chartsRoot');
            var raw = (document.getElementById('tickerInput').value || '').trim();
            var t = raw.toUpperCase();
            var days = document.getElementById('daysSel').value;
            statusEl.textContent = 'Загрузка…';
            destroyCharts();
            root.innerHTML = '';

            try {
                if (!t) {
                    var r = await fetch('/api/portfolio/charts?days=' + encodeURIComponent(days));
                    if (!r.ok) {
                        var err = await r.json().catch(function() { return {}; });
                        statusEl.textContent = err.detail || r.statusText;
                        return;
                    }
                    var pack = await r.json();
                    var charts = pack.charts || [];
                    var ok = 0, empty = 0;
                    charts.forEach(function(item) {
                        var sec = document.createElement('div');
                        sec.className = 'chart-section';
                        var h = document.createElement('h2');
                        h.textContent = item.ticker || '—';
                        var cv = document.createElement('canvas');
                        sec.appendChild(h);
                        sec.appendChild(cv);
                        root.appendChild(sec);
                        var bars = item.bars || [];
                        if (!bars.length) {
                            empty++;
                            var p = document.createElement('p');
                            p.className = 'muted';
                            p.textContent = item.error === 'no_data' ? 'Нет дневных котировок в quotes.' : 'Нет данных.';
                            sec.appendChild(p);
                            return;
                        }
                        ok++;
                        chartInstances.push(buildLineChart(cv, '', bars));
                    });
                    statusEl.textContent = charts.length ? ('Тикеров: ' + charts.length + ' · с данными: ' + ok + (empty ? ' · без рядов: ' + empty : '')) : 'Список тикеров портфеля пуст.';
                    return;
                }

                var r1 = await fetch('/api/portfolio/chart/' + encodeURIComponent(t) + '?days=' + days);
                if (!r1.ok) {
                    var err1 = await r1.json().catch(function() { return {}; });
                    statusEl.textContent = err1.detail || r1.statusText;
                    return;
                }
                var data = await r1.json();
                var bars = data.bars || [];
                if (!bars.length) {
                    statusEl.textContent = 'Нет дневных котировок для ' + t;
                    return;
                }
                var sec = document.createElement('div');
                sec.className = 'chart-section';
                var h = document.createElement('h2');
                h.textContent = t;
                var cv = document.createElement('canvas');
                sec.appendChild(h);
                sec.appendChild(cv);
                root.appendChild(sec);
                chartInstances.push(buildLineChart(cv, '', bars));
                statusEl.textContent = 'Тикер: ' + t + ' · точек: ' + bars.length;
            } catch (e) {
                statusEl.textContent = 'Ошибка: ' + (e.message || String(e));
            }
        }

        (function init() {
            var fromUrl = qs('ticker');
            document.getElementById('tickerInput').value = fromUrl ? fromUrl.trim() : '';
            document.getElementById('loadBtn').addEventListener('click', loadChart);
            document.getElementById('daysSel').addEventListener('change', loadChart);
            loadChart();
        })();
    </script>
</body>
</html>
