<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>5m — карточки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --content-pad-x: clamp(0.5rem, 2.5vw, 1.5rem);
            --content-max: 100%;
        }
        @media (min-width: 600px) {
            :root { --content-max: min(100% - 1.5rem, 560px); }
        }
        @media (min-width: 768px) {
            :root { --content-max: min(100% - 2rem, 720px); }
        }
        @media (min-width: 992px) {
            :root { --content-max: min(100% - 2.5rem, 960px); }
        }
        @media (min-width: 1200px) {
            :root { --content-max: min(100% - 3rem, 1140px); }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            padding: 0 var(--content-pad-x) 2rem;
            padding-left: max(var(--content-pad-x), env(safe-area-inset-left, 0px));
            padding-right: max(var(--content-pad-x), env(safe-area-inset-right, 0px));
            max-width: var(--content-max);
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .header {
            position: relative;
            background: #16213e;
            padding: 0.6rem 0.8rem;
            padding-top: max(0.6rem, env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 1rem; font-weight: 600; }
        .header a { color: #7dd3fc; text-decoration: none; font-size: 0.9rem; }
        .updated { font-size: 0.75rem; color: #94a3b8; }
        .btn { background: #0f3460; color: #e2e8f0; border: none; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
        .btn:active { background: #1e3a5f; }
        .card-5m {
            background: #16213e;
            border-radius: 10px;
            margin: 0.8rem 0.8rem 0;
            padding: 0.9rem;
            border-left: 4px solid #475569;
        }
        .card-5m.decision-buy { border-left-color: #22c55e; }
        .card-5m.decision-sell { border-left-color: #ef4444; }
        .card-5m.decision-hold { border-left-color: #eab308; }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .card-head .ticker { font-weight: 700; font-size: 1.1rem; }
        .card-head .decision { font-size: 0.85rem; padding: 0.2rem 0.5rem; border-radius: 6px; }
        .card-head .decision.BUY, .card-head .decision.STRONG_BUY { background: #14532d; color: #86efac; }
        .card-head .decision.SELL { background: #7f1d1d; color: #fca5a5; }
        .card-head .decision.HOLD { background: #422006; color: #fde047; }
        .row { display: flex; justify-content: space-between; margin: 0.35rem 0; font-size: 0.85rem; }
        .row .label { color: #94a3b8; }
        .row .value.positive { color: #86efac; }
        .row .value.negative { color: #fca5a5; }
        .block-title { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin: 0.5rem 0 0.25rem; }
        .reasoning { font-size: 0.8rem; color: #cbd5e1; margin-top: 0.5rem; line-height: 1.4; }
        .verdict-block { margin: 0.55rem 0; padding: 0.55rem 0.65rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; font-size: 0.8rem; line-height: 1.35; }
        .verdict-label { font-weight: 700; color: #e2e8f0; }
        .verdict-reason { color: #94a3b8; margin-top: 0.25rem; }
        .llm-btn { margin-top: 0.6rem; width: 100%; font-size: 0.8rem; }
        .llm-block { margin-top: 0.5rem; padding: 0.6rem; background: #0f172a; border-radius: 6px; font-size: 0.8rem; color: #cbd5e1; white-space: pre-wrap; display: none; }
        .llm-block.open { display: block; }
        .loading-llm { color: #94a3b8; }
        .chart-link { font-size: 0.8rem; margin-top: 0.4rem; }
        .chart-link a { color: #7dd3fc; }
        .no-data { color: #64748b; font-style: italic; }
        .muted { color: #94a3b8; }
        .forecast-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            margin-top: 0.35rem;
            color: #cbd5e1;
        }
        .forecast-table th, .forecast-table td {
            padding: 0.3rem 0.35rem;
            text-align: right;
            border-bottom: 1px solid #334155;
        }
        .forecast-table th:first-child, .forecast-table td:first-child { text-align: left; }
        .forecast-table th { color: #94a3b8; font-weight: 600; }
        .forecast-table tbody tr:last-child td { border-bottom: none; }
        .forecast-table .num { font-variant-numeric: tabular-nums; }
        .forecast-fallback { font-size: 0.78rem; color: #cbd5e1; line-height: 1.35; margin-top: 0.35rem; }
        .explain-details {
            margin-top: 0.35rem;
            padding: 0.45rem 0.55rem;
            border: 1px solid #334155;
            border-radius: 7px;
            background: #0f172a;
            font-size: 0.76rem;
            color: #cbd5e1;
            line-height: 1.35;
        }
        .explain-details summary {
            cursor: pointer;
            color: #93c5fd;
            font-weight: 600;
        }
        .explain-details p { margin: 0.35rem 0 0; }
        @media (min-width: 900px) {
            #cardsContainer {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0 0.75rem;
                padding: 0 0.25rem;
            }
            .card-5m { margin-left: 0; margin-right: 0; }
        }
        @media (min-width: 1200px) {
            #cardsContainer { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>
{% include "partials/site_nav_standalone.html" %}
    <div class="header">
        <h1>5m карточки</h1>
        <div>
            <span class="updated" id="updatedAt">—</span>
        </div>
    </div>
    <div style="padding: 0.5rem 0.8rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;">
        <button class="btn" id="refreshBtn">Обновить</button>
        <label class="muted" style="font-size: 0.85rem; cursor: pointer;">
            <input type="checkbox" id="autoRefresh" checked style="vertical-align: middle; margin-right: 0.35rem;">
            Каждые 5 мин (тех. карточки)
        </label>
        <span class="muted" id="autoRefreshHint" style="font-size: 0.75rem;"></span>
    </div>
    <div id="cardsContainer"></div>

    <script>
        var LSE_WEB_LLM_ENABLED = {% if web_llm_enabled %}true{% else %}false{% endif %};
        var REFRESH_INTERVAL_MS = 5 * 60 * 1000;
        var refreshTimer = null;
        function scheduleAutoRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = null;
            var cb = document.getElementById('autoRefresh');
            var hint = document.getElementById('autoRefreshHint');
            if (!cb || !cb.checked) {
                if (hint) hint.textContent = '';
                return;
            }
            var next = new Date(Date.now() + REFRESH_INTERVAL_MS);
            if (hint) hint.textContent = 'След. авто: ' + next.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            refreshTimer = setTimeout(function() {
                loadCards(true).then(function() { scheduleAutoRefresh(); });
            }, REFRESH_INTERVAL_MS);
        }
        function escapeHtml(s) {
            if (s == null || s === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(s);
            return div.innerHTML;
        }
        function fmt(v, decimals) {
            if (v == null || v === undefined) return '—';
            if (typeof v === 'number' && decimals != null) return v.toFixed(decimals);
            return String(v);
        }
        function renderDetails(summary, bodyHtml) {
            return '<details class="explain-details"><summary>' + escapeHtml(summary) + '</summary>' + bodyHtml + '</details>';
        }
        function decisionClass(d) {
            if (!d) return '';
            if (d === 'BUY' || d === 'STRONG_BUY') return 'decision-buy';
            if (d === 'SELL') return 'decision-sell';
            return 'decision-hold';
        }
        function renderForecastTable(c) {
            var fc = c.price_forecast_5m;
            if (fc && Array.isArray(fc.horizons) && fc.horizons.length > 0) {
                var rows = fc.horizons.map(function(h) {
                    var label = h.minutes != null ? String(h.minutes) + 'м' : '—';
                    function pctCell(v) {
                        if (v == null || v === undefined) return '<td class="num">—</td>';
                        var s = (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';
                        return '<td class="num">' + escapeHtml(s) + '</td>';
                    }
                    var pgt = h.p_price_gt_spot != null ? fmt(h.p_price_gt_spot, 3) : '—';
                    return '<tr><td>' + escapeHtml(label) + '</td>' +
                        pctCell(h.p10_pct_vs_spot) + pctCell(h.p50_pct_vs_spot) + pctCell(h.p90_pct_vs_spot) +
                        '<td class="num">' + escapeHtml(pgt) + '</td></tr>';
                }).join('');
                return '<table class="forecast-table" role="table"><thead><tr>' +
                    '<th>Горизонт</th><th>p10</th><th>p50</th><th>p90</th><th>P(&gt;spot)</th></tr></thead><tbody>' +
                    rows + '</tbody></table>' +
                    renderDetails('Как читать 30/60/120м прогноз', '<p><strong>p50</strong> — центральный прогноз к текущему spot; <strong>p10/p90</strong> — нижний/верхний сценарий распределения. <strong>P(&gt;spot)</strong> — вероятность, что цена на горизонте будет выше текущей. Это прогноз диапазона, а не готовый тейк.</p>');
            }
            if (c.price_forecast_5m_summary) {
                return '<div class="forecast-fallback">' + escapeHtml(c.price_forecast_5m_summary) + '</div>';
            }
            return '';
        }
        function formatGapPctSigned(v, decimals) {
            if (v == null || v === undefined || isNaN(Number(v))) return null;
            var n = Number(v);
            return (n >= 0 ? '+' : '') + fmt(n, decimals) + '%';
        }
        function tickerGapMacroSuffix(c) {
            var pred = formatGapPctSigned(c.ticker_open_gap_predicted_pct, 2);
            var fact = formatGapPctSigned(c.ticker_open_gap_fact_pct, 2);
            if (!pred && !fact) return '';
            var parts = [];
            if (pred) parts.push('прогноз ' + pred);
            if (fact) {
                var basis = c.ticker_open_gap_fact_basis || '';
                var sfx = basis === 'open_9_30_et' ? ' (open)' : (basis === 'premarket' ? ' (премаркет)' : '');
                parts.push('факт ' + fact + sfx);
            }
            return '; гэп ' + escapeHtml(String(c.ticker || '')) + ': ' + parts.join(' · ');
        }
        function renderPremarketGapBlock(c) {
            var pred = c.ticker_open_gap_predicted_pct;
            var fact = c.ticker_open_gap_fact_pct;
            if (pred == null && fact == null) {
                return '';
            }
            var html = '<div class="block-title">Гэп на open (тикер)</div>';
            if (pred != null && pred !== undefined && !isNaN(Number(pred))) {
                var p = Number(pred);
                var pCls = p >= 0 ? 'positive' : 'negative';
                var src = (c.ticker_open_gap_predicted_source || '').toLowerCase();
                var srcHint = src === 'ticker_ols_v2_premarket_blend' ? 'OLS v2 + премаркет'
                    : (src === 'ticker_ols_v2' || src === 'ticker_ols' ? 'OLS v2 по тикеру' : (src === 'sector_proxy' ? 'прокси SMH' : src));
                html += '<div class="row"><span class="label">Прогноз</span><span class="value ' + pCls + '" title="' + escapeHtml(srcHint) + '">' +
                    (p >= 0 ? '+' : '') + fmt(p, 2) + '%</span></div>';
            }
            if (fact != null && fact !== undefined && !isNaN(Number(fact))) {
                var f = Number(fact);
                var fCls = f >= 0 ? 'positive' : 'negative';
                var basis = c.ticker_open_gap_fact_basis || '';
                var factLbl = basis === 'open_9_30_et' ? 'Факт (open 9:30 ET)' : (basis === 'premarket' ? 'Факт (премаркет)' : 'Факт');
                html += '<div class="row"><span class="label">' + escapeHtml(factLbl) + '</span><span class="value ' + fCls + '">' +
                    (f >= 0 ? '+' : '') + fmt(f, 2) + '%</span></div>';
            }
            html += renderDetails('Что значит гэп на open', '<p>Это отдельный прогноз разрыва между предыдущим close и open 9:30 ET. Он полезен как контекст старта сессии и не равен дневному ridge-прогнозу 1–3 торговых дня.</p>');
            return html;
        }
        function renderMultidayLrTable(c) {
            var fc = c.log_return_multiday_forecast;
            if (fc && fc.horizons && typeof fc.horizons === 'object') {
                var keys = ['1', '2', '3'];
                var rows = [];
                for (var i = 0; i < keys.length; i++) {
                    var h = fc.horizons[keys[i]];
                    if (!h || typeof h !== 'object') continue;
                    var pct = h.predicted_pct_vs_spot;
                    var predLog = h.predicted_log_ret;
                    var pctStr = '—';
                    if (pct != null && pct !== undefined && Number.isFinite(Number(pct))) {
                        var p = Number(pct);
                        pctStr = (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
                    }
                    var logStr = '—';
                    if (predLog != null && predLog !== undefined && Number.isFinite(Number(predLog))) {
                        var l = Number(predLog);
                        logStr = (l >= 0 ? '+' : '') + l.toFixed(4);
                    }
                    rows.push('<tr><td>' + escapeHtml(keys[i] + ' торг. дн.') + '</td><td class="num">' + escapeHtml(pctStr) + '</td><td class="num" title="Прогноз суммарной log-return на этот горизонт">' + escapeHtml(logStr) + '</td></tr>');
                }
                if (rows.length) {
                    var meta = [];
                    if (c.multiday_lr_daily_close_source) {
                        meta.push('дневка: ' + escapeHtml(String(c.multiday_lr_daily_close_source)));
                    }
                    if (fc.daily_last_date) meta.push('посл. день: ' + escapeHtml(String(fc.daily_last_date)));
                    if (fc.premarket_db_used) meta.push('премаркет БД');
                    if (fc.news_db_used) meta.push('news БД');
                    if (fc.macro_calendar_db_used) meta.push('макро-календарь');
                    if (fc.symbol_calendar_db_used) meta.push('earnings-календарь');
                    if (fc.n_features != null && fc.n_features !== undefined) meta.push('фичей: ' + escapeHtml(String(fc.n_features)));
                    var sub = meta.length ? '<div class="forecast-fallback" style="margin-top:0.2rem;">' + meta.join(' · ') + '</div>' : '';
                    return '<p class="forecast-fallback muted" style="margin:0 0 0.35rem 0;font-size:0.78rem;">Прогноз одной ridge-модели к <strong>текущей цене</strong>: простой % и та же величина в log-return. Календарь/news/premarket ниже — входные фичи этой регрессии.</p>' +
                        '<table class="forecast-table" role="table"><thead><tr>' +
                        '<th>Горизонт</th><th>Ожидаемо к spot</th><th title="Прогноз суммарной log-return на горизонт">Прогноз log-ret</th></tr></thead><tbody>' +
                        rows.join('') + '</tbody></table>' + sub +
                        renderDetails('Как читать дневку и календарь', '<p><strong>Ожидаемо к spot</strong> — прогноз простого изменения цены на 1/2/3 торговых дня. <strong>Прогноз log-ret</strong> — та же доходность в log-пространстве, на котором обучается модель.</p><p><strong>Макро-календарь</strong>, <strong>earnings-календарь</strong>, <strong>news</strong> и <strong>premarket</strong> — входные признаки этой модели. У них нет отдельной собственной доходности в карточке; их вклад имеет смысл показывать отдельным сравнением “без фичи / с фичей”.</p>');
                }
            }
            if (c.log_return_multiday_forecast_summary) {
                return '<div class="forecast-fallback">' + escapeHtml(c.log_return_multiday_forecast_summary) + '</div>';
            }
            return '';
        }
        function renderDecisionVerdict(c) {
            var v = c.decision_verdict;
            if (!v || typeof v !== 'object') return '';
            var reasons = Array.isArray(v.primary_reasons) ? v.primary_reasons.slice(0, 3) : [];
            var label = v.label || 'Hold';
            var eff = v.effective_decision || c.technical_decision_effective || c.decision || '—';
            var projected = v.projected_effective_if_resolve || c.decision_stack_projected_effective;
            var html = '<div class="verdict-block">';
            html += '<div><span class="muted">Unified verdict</span> <span class="verdict-label">' + escapeHtml(label) + '</span>';
            html += ' · effective <code>' + escapeHtml(eff) + '</code>';
            if (projected && projected !== eff) {
                html += ' · shadow <code>' + escapeHtml(projected) + '</code>';
            }
            if (v.resolve_divergence) {
                html += ' <span class="negative">diff</span>';
            }
            html += '</div>';
            if (reasons.length) {
                html += '<div class="verdict-reason">' + reasons.map(escapeHtml).join('<br>') + '</div>';
            }
            html += '</div>';
            return html;
        }
        function renderCard(c) {
            const isNoData = c.decision === 'NO_DATA';
            const upside = c.estimated_upside_pct_day != null ? c.estimated_upside_pct_day : c.take_profit_pct;
            const upsideRaw = c.estimated_upside_forecast_raw_pct;
            const stopEnabled = c.stop_loss_enabled === true;
            const downsideRisk = c.estimated_downside_pct_day;
            const pullback = c.pullback_from_high_pct;
            let html = '<div class="card-5m ' + decisionClass(c.decision) + '" data-ticker="' + escapeHtml(c.ticker) + '">';
            html += '<div class="card-head"><span class="ticker">' + escapeHtml(c.ticker) + '</span><span class="decision">' + escapeHtml(c.decision || '—') + '</span></div>';
            if (isNoData) {
                html += '<p class="no-data">' + escapeHtml(c.reasoning || 'Нет данных') + '</p></div>';
                return html;
            }
            html += renderDecisionVerdict(c);
            if (c.catboost_signal_status) {
                html += '<div class="block-title">CatBoost (осторожный фильтр входа)</div>';
                html += '<div class="row"><span class="label">Статус / режим</span><span class="value">' +
                    escapeHtml(String(c.catboost_signal_status || '—')) + ' · ' + escapeHtml(String(c.catboost_fusion_mode || '—')) +
                    '</span></div>';
                if (c.catboost_entry_proba_good != null) {
                    html += '<div class="row"><span class="label">P(хороший исход)</span><span class="value">' + fmt(c.catboost_entry_proba_good, 3) + '</span></div>';
                }
                if (c.technical_decision_core && c.technical_decision_effective && c.technical_decision_core !== c.technical_decision_effective) {
                    html += '<div class="row"><span class="label">Сигнал (core→effective)</span><span class="value">' +
                        escapeHtml(String(c.technical_decision_core)) + ' → <strong>' + escapeHtml(String(c.technical_decision_effective)) + '</strong>' +
                        '</span></div>';
                }
                if (c.catboost_fusion_note) {
                    html += '<div class="row"><span class="label">Заметка</span><span class="value muted" style="font-size:0.85em;">' + escapeHtml(String(c.catboost_fusion_note)) + '</span></div>';
                }
            }
            html += '<div class="row"><span class="label">Цена</span><span class="value">' + fmt(c.price, 2) + '</span></div>';
            html += '<div class="row"><span class="label">RSI(5m)</span><span class="value">' + fmt(c.rsi_5m, 1) + '</span></div>';
            var verdict = c.qwen_checklist_verdict || '';
            if (verdict) {
                var verdictClass = verdict.indexOf('Позитивно') === 0 ? 'positive' : (verdict.indexOf('Негативно') === 0 ? 'negative' : 'muted');
                html += '<div class="row"><span class="label">Вывод Квена</span><span class="value ' + verdictClass + '" style="font-size:0.85em;">' + escapeHtml(verdict) + '</span></div>';
            }
            var momLabel = (c.momentum_window_min != null && c.momentum_window_min > 0 && c.momentum_window_min < 120)
                ? ('Импульс за ' + c.momentum_window_min + ' мин')
                : 'Импульс 2ч';
            html += '<div class="row"><span class="label">' + momLabel + '</span><span class="value">' + fmt(c.momentum_2h_pct, 2) + '%</span></div>';
            if (pullback != null) html += '<div class="row"><span class="label">Откат от хая</span><span class="value">' + fmt(pullback, 2) + '%</span></div>';
            if (c.volatility_5m_pct != null) html += '<div class="row"><span class="label">Волатильность 5m</span><span class="value">' + fmt(c.volatility_5m_pct, 2) + '%</span></div>';
            if (upside != null) {
                html += '<div class="row"><span class="label" title="Эффективный тейк для игры (после пола мин. 4% и тикерного cap)">Upside день (цель)</span><span class="value positive">+' + fmt(upside, 1) + '%</span></div>';
                if (upsideRaw != null && upsideRaw !== undefined && Math.abs(Number(upsideRaw) - Number(upside)) > 0.02) {
                    html += '<div class="row"><span class="label" title="Смесь 60/120m (p50), cap по p90 и тикеру — до применения пола 4%">По прогнозу (до пола 4%)</span><span class="value positive">+' + fmt(upsideRaw, 1) + '%</span></div>';
                }
            }
            if (downsideRisk != null) html += '<div class="row"><span class="label" title="Оценка возможной просадки вниз; больше по модулю (например 2.5% vs 1.3%) — больший риск. Знак «−» — направление, не «счёт осторожности».">Downside риск</span><span class="value negative">−' + fmt(downsideRisk, 1) + '%</span></div>';
            if (c.prob_up != null && c.prob_down != null) html += '<div class="row"><span class="label">P(up/down)</span><span class="value">' + fmt(c.prob_up, 2) + '/' + fmt(c.prob_down, 2) + '</span></div>';
            html += renderDetails('Тех. величины перед прогнозами', '<p><strong>RSI(5m)</strong>, <strong>импульс</strong>, <strong>откат от хая</strong> и <strong>волатильность 5m</strong> описывают текущий intraday-режим. <strong>Upside день</strong> — рабочая цель/тейк после правил игры, а <strong>по прогнозу до пола</strong> показывает сырой forecast до минимального тейка. <strong>Downside риск</strong> — оценка просадки, не вероятность.</p>');
            var fcBlock = renderForecastTable(c);
            if (fcBlock) {
                html += '<div class="block-title">Прогноз цены к spot (30/60/120 м, %)</div>';
                html += fcBlock;
            }
            var mlrBlock = renderMultidayLrTable(c);
            if (mlrBlock) {
                html += '<div class="block-title">Дневка — ожидаемый % к spot (1–3 торг. дня)</div>';
                html += mlrBlock;
            } else if (c.multiday_lr_forecast_unavailable) {
                html += '<div class="block-title">Дневка — ожидаемый % к spot (1–3 торг. дня)</div>';
                var why = c.multiday_lr_forecast_error ? escapeHtml(String(c.multiday_lr_forecast_error)) : 'Нет прогноза (мало валидных дневных строк / Yahoo). См. логи контейнера: multiday_lr_forecast_none.';
                html += '<div class="forecast-fallback muted">' + why + '</div>';
            }
            var pmGapBlock = renderPremarketGapBlock(c);
            if (pmGapBlock) html += pmGapBlock;
            html += '<div class="row"><span class="label">Вход</span><span class="value">' + escapeHtml(c.entry_advice || '—') + '</span></div>';
            var localEntryReason = (c.entry_advice_reason_local != null && String(c.entry_advice_reason_local).trim())
                ? String(c.entry_advice_reason_local).trim()
                : '';
            if (!localEntryReason && c.entry_advice_reason && (!c.macro_risk_level || c.macro_risk_level === 'NEUTRAL')) {
                localEntryReason = String(c.entry_advice_reason).trim();
            }
            if (localEntryReason && c.entry_advice !== 'ALLOW') {
                html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.78rem;">' + escapeHtml(localEntryReason) + '</span></div>';
            }
            if (c.macro_risk_level && c.macro_risk_level !== 'NEUTRAL') {
                var macroLine = escapeHtml(String(c.macro_risk_level));
                if (c.macro_equity_gap_bias) macroLine += ' · ' + escapeHtml(String(c.macro_equity_gap_bias));
                var macroReasons = Array.isArray(c.macro_risk_reasons) ? c.macro_risk_reasons : [];
                if (macroReasons.length) {
                    macroLine += ' — ' + escapeHtml(macroReasons.join('; '));
                }
                var gapMacro = tickerGapMacroSuffix(c);
                if (gapMacro) {
                    macroLine += gapMacro;
                } else if (c.macro_predicted_sector_gap_pct != null && c.macro_sector_proxy) {
                    macroLine += '; прогноз гэпа ' + escapeHtml(String(c.macro_sector_proxy)) + ' '
                        + (Number(c.macro_predicted_sector_gap_pct) >= 0 ? '+' : '')
                        + escapeHtml(String(c.macro_predicted_sector_gap_pct)) + '%';
                }
                html += '<div class="row"><span class="label">Макро</span><span class="value muted" style="font-size:0.85rem;">' + macroLine + '</span></div>';
            }
            if (LSE_WEB_LLM_ENABLED) {
                html += '<button class="btn llm-btn" data-ticker="' + escapeHtml(c.ticker) + '">Вывод LLM</button>';
                html += '<div class="llm-block" id="llm-' + escapeHtml(c.ticker) + '"></div>';
            }
            html += '<div class="chart-link"><a href="/visualization?ticker=' + encodeURIComponent(c.ticker) + '" target="_blank">График 5m</a></div>';
            html += '</div>';
            return html;
        }
        async function loadCards(silent) {
            const container = document.getElementById('cardsContainer');
            const updatedEl = document.getElementById('updatedAt');
            if (!silent) container.innerHTML = '<div class="loading-llm" style="padding:1rem;">Загрузка…</div>';
            try {
                const r = await fetch('/api/game5m/cards?days=5&_=' + Date.now(), { cache: 'no-store' });
                if (!r.ok) { container.innerHTML = '<div style="color:#fca5a5;">Ошибка ' + r.status + '</div>'; return; }
                const data = await r.json();
                if (typeof data.web_llm_enabled === 'boolean') {
                    LSE_WEB_LLM_ENABLED = data.web_llm_enabled;
                }
                updatedEl.textContent = data.updated_at ? new Date(data.updated_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '—';
                container.innerHTML = (data.cards || []).map(renderCard).join('');
                document.querySelectorAll('.llm-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() { onLlmClick(this.getAttribute('data-ticker')); });
                });
            } catch (e) {
                container.innerHTML = '<div style="color:#fca5a5;">' + escapeHtml(e.message) + '</div>';
            }
            return Promise.resolve();
        }
        async function onLlmClick(ticker) {
            const block = document.getElementById('llm-' + ticker);
            if (!block || !LSE_WEB_LLM_ENABLED) return;
            if (block.classList.contains('open') && block.dataset.loaded === '1') return;
            block.classList.add('open');
            block.innerHTML = '<span class="loading-llm">Загрузка LLM… (может занять до 1–2 мин)</span>';
            const controller = new AbortController();
            const timeoutId = setTimeout(function() { controller.abort(); }, 120000);
            try {
                const r = await fetch('/api/game5m/card/' + encodeURIComponent(ticker) + '/llm', { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!r.ok) {
                    var errBody = '';
                    try { var j = await r.json(); errBody = j.detail || JSON.stringify(j); } catch (_) { errBody = await r.text() || r.statusText; }
                    block.textContent = 'Ошибка ' + r.status + ': ' + (errBody || r.statusText);
                    block.dataset.loaded = '1';
                    return;
                }
                const data = await r.json();
                let text = (data.llm_reasoning || '').trim();
                if (data.llm_key_factors && Array.isArray(data.llm_key_factors) && data.llm_key_factors.length > 0) {
                    var labels = data.llm_key_factors.filter(function(f){ return f && String(f).trim().length > 0; }).map(function(f){ return String(f).trim(); });
                    if (labels.length > 0) text += (text ? '\n\nКлючевое: ' : '') + labels.join(' · ');
                }
                if (!text) text = 'Нет вывода LLM.';
                block.textContent = text;
                block.dataset.loaded = '1';
            } catch (e) {
                clearTimeout(timeoutId);
                if (e.name === 'AbortError') {
                    block.textContent = 'Таймаут (запрос дольше 2 мин). Попробуйте ещё раз или проверьте сервер.';
                } else {
                    block.textContent = 'Ошибка: ' + escapeHtml(e.message);
                }
                block.dataset.loaded = '1';
            }
        }
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadCards(false).then(function() { scheduleAutoRefresh(); });
        });
        document.getElementById('autoRefresh').addEventListener('change', scheduleAutoRefresh);
        loadCards(false).then(function() { scheduleAutoRefresh(); });
    </script>
</body>
</html>
