<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>5m — карточки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --content-pad-x: clamp(0.5rem, 2.5vw, 1.5rem);
            --content-max: 100%;
        }
        @media (min-width: 600px) {
            :root { --content-max: min(100% - 1.5rem, 560px); }
        }
        @media (min-width: 768px) {
            :root { --content-max: min(100% - 2rem, 720px); }
        }
        @media (min-width: 992px) {
            :root { --content-max: min(100% - 2.5rem, 960px); }
        }
        @media (min-width: 1200px) {
            :root { --content-max: min(100% - 3rem, 1140px); }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            padding: 0 var(--content-pad-x) 2rem;
            padding-left: max(var(--content-pad-x), env(safe-area-inset-left, 0px));
            padding-right: max(var(--content-pad-x), env(safe-area-inset-right, 0px));
            max-width: var(--content-max);
            margin: 0 auto;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .header {
            position: relative;
            background: #16213e;
            padding: 0.6rem 0.8rem;
            padding-top: max(0.6rem, env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 { font-size: 1rem; font-weight: 600; }
        .header a { color: #7dd3fc; text-decoration: none; font-size: 0.9rem; }
        .updated { font-size: 0.75rem; color: #94a3b8; }
        .btn { background: #0f3460; color: #e2e8f0; border: none; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
        .btn:active { background: #1e3a5f; }
        .card-5m {
            background: #16213e;
            border-radius: 10px;
            margin: 0.8rem 0.8rem 0;
            padding: 0.9rem;
            border-left: 4px solid #475569;
        }
        .card-5m.decision-buy { border-left-color: #22c55e; }
        .card-5m.decision-sell { border-left-color: #ef4444; }
        .card-5m.decision-hold { border-left-color: #eab308; }
        .card-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .card-head .ticker { font-weight: 700; font-size: 1.1rem; }
        .card-head .decision { font-size: 0.85rem; padding: 0.2rem 0.5rem; border-radius: 6px; }
        .card-head .decision.BUY, .card-head .decision.STRONG_BUY { background: #14532d; color: #86efac; }
        .card-head .decision.SELL { background: #7f1d1d; color: #fca5a5; }
        .card-head .decision.HOLD { background: #422006; color: #fde047; }
        .row { display: flex; justify-content: space-between; margin: 0.35rem 0; font-size: 0.85rem; }
        .row .label { color: #94a3b8; }
        .row .value.positive { color: #86efac; }
        .row .value.negative { color: #fca5a5; }
        .block-title { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin: 0.5rem 0 0.25rem; }
        .reasoning { font-size: 0.8rem; color: #cbd5e1; margin-top: 0.5rem; line-height: 1.4; }
        .verdict-block { margin: 0.55rem 0; padding: 0.55rem 0.65rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; font-size: 0.8rem; line-height: 1.35; }
        .verdict-label { font-weight: 700; color: #e2e8f0; }
        .verdict-reason { color: #94a3b8; margin-top: 0.25rem; }
        .llm-btn { margin-top: 0.6rem; width: 100%; font-size: 0.8rem; box-sizing: border-box; text-align: center; text-decoration: none; display: inline-block; }
        .loading-llm { color: #94a3b8; }
        .chart-link { font-size: 0.8rem; margin-top: 0.4rem; }
        .chart-link a { color: #7dd3fc; }
        .no-data { color: #64748b; font-style: italic; }
        .muted { color: #94a3b8; }
        .forecast-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            margin-top: 0.35rem;
            color: #cbd5e1;
        }
        .forecast-table th, .forecast-table td {
            padding: 0.3rem 0.35rem;
            text-align: right;
            border-bottom: 1px solid #334155;
        }
        .forecast-table th:first-child, .forecast-table td:first-child { text-align: left; }
        .forecast-table th { color: #94a3b8; font-weight: 600; }
        .forecast-table tbody tr:last-child td { border-bottom: none; }
        .forecast-table .num { font-variant-numeric: tabular-nums; }
        .forecast-fallback { font-size: 0.78rem; color: #cbd5e1; line-height: 1.35; margin-top: 0.35rem; }
        .explain-details {
            margin-top: 0.35rem;
            padding: 0.45rem 0.55rem;
            border: 1px solid #334155;
            border-radius: 7px;
            background: #0f172a;
            font-size: 0.76rem;
            color: #cbd5e1;
            line-height: 1.35;
        }
        .explain-details summary {
            cursor: pointer;
            color: #93c5fd;
            font-weight: 600;
        }
        .explain-details p { margin: 0.35rem 0 0; }
        .head-badges { display: flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
        .badge-session, .badge-prelim {
            font-size: 0.68rem;
            padding: 0.15rem 0.45rem;
            border-radius: 999px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .badge-session { background: #1e3a5f; color: #93c5fd; }
        .badge-session.pm { background: #422006; color: #fde047; }
        .badge-prelim { background: #4c1d95; color: #ddd6fe; }
        .decision-sub { font-size: 0.72rem; color: #94a3b8; margin-top: 0.15rem; }
        .gate-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin: 0.4rem 0; }
        .gate-chip {
            font-size: 0.72rem;
            padding: 0.2rem 0.45rem;
            border-radius: 6px;
            background: #0f172a;
            border: 1px solid #475569;
            color: #e2e8f0;
        }
        .gate-chip.warn { border-color: #ca8a04; color: #fde047; }
        .gate-chip.ok { border-color: #16a34a; color: #86efac; }
        .gate-chip.bad { border-color: #b91c1c; color: #fca5a5; }
        .ml-shadow-block {
            margin: 0.35rem 0 0.5rem;
            padding: 0.5rem 0.6rem;
            background: #0f172a;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .checklist-line { font-size: 0.82rem; margin: 0.35rem 0; font-variant-numeric: tabular-nums; }
        .checklist-line .ok { color: #86efac; }
        .checklist-line .bad { color: #fca5a5; }
        .regime-line { font-size: 0.78rem; color: #cbd5e1; margin: 0.25rem 0 0.35rem; }
        .accent-row .value { font-weight: 600; }
        @media (min-width: 900px) {
            #cardsContainer {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0 0.75rem;
                padding: 0 0.25rem;
            }
            .card-5m { margin-left: 0; margin-right: 0; }
        }
        @media (min-width: 1200px) {
            #cardsContainer { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
    </style>
    {% include "partials/lse_fetch_shim.html" %}
</head>
<body>
{% include "partials/site_nav_standalone.html" %}
    <div class="header">
        <h1>5m карточки</h1>
        <div>
            <span class="updated" id="updatedAt">—</span>
        </div>
    </div>
    <div style="padding: 0.5rem 0.8rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;">
        <button class="btn" id="refreshBtn">Обновить</button>
        <label class="muted" style="font-size: 0.85rem; cursor: pointer;">
            <input type="checkbox" id="autoRefresh" checked style="vertical-align: middle; margin-right: 0.35rem;">
            Каждые 5 мин (тех. карточки)
        </label>
        <span class="muted" id="autoRefreshHint" style="font-size: 0.75rem;"></span>
    </div>
    <div id="cardsContainer"></div>

    <script>
        var LSE_WEB_LLM_ENABLED = {% if web_llm_enabled %}true{% else %}false{% endif %};
        var REFRESH_INTERVAL_MS = 5 * 60 * 1000;
        var refreshTimer = null;
        function scheduleAutoRefresh() {
            if (refreshTimer) clearTimeout(refreshTimer);
            refreshTimer = null;
            var cb = document.getElementById('autoRefresh');
            var hint = document.getElementById('autoRefreshHint');
            if (!cb || !cb.checked) {
                if (hint) hint.textContent = '';
                return;
            }
            var next = new Date(Date.now() + REFRESH_INTERVAL_MS);
            if (hint) hint.textContent = 'След. авто: ' + next.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            refreshTimer = setTimeout(function() {
                loadCards(true).then(function() { scheduleAutoRefresh(); });
            }, REFRESH_INTERVAL_MS);
        }
        function escapeHtml(s) {
            if (s == null || s === undefined) return '';
            const div = document.createElement('div');
            div.textContent = String(s);
            return div.innerHTML;
        }
        function fmt(v, decimals) {
            if (v == null || v === undefined) return '—';
            if (typeof v === 'number' && decimals != null) return v.toFixed(decimals);
            return String(v);
        }
        function renderDetails(summary, bodyHtml) {
            return '<details class="explain-details"><summary>' + escapeHtml(summary) + '</summary>' + bodyHtml + '</details>';
        }
        function decisionClass(d) {
            if (!d) return '';
            if (d === 'BUY' || d === 'STRONG_BUY') return 'decision-buy';
            if (d === 'SELL') return 'decision-sell';
            return 'decision-hold';
        }
        function effectiveDecision(c) {
            return c.decision_effective || c.technical_decision_effective || c.decision || '—';
        }
        function coreDecision(c) {
            return c.technical_decision_core || c.decision || '—';
        }
        function sessionPhase(c) {
            return String(c.session_phase || (c.market_session && c.market_session.session_phase) || '').trim();
        }
        function isPremarketPhase(c) {
            var ph = sessionPhase(c);
            return ph === 'PRE_MARKET' || ph === 'PREMARKET';
        }
        function sessionPhaseRu(c) {
            var ph = sessionPhase(c);
            if (ph === 'PRE_MARKET' || ph === 'PREMARKET') {
                var mins = c.minutes_until_open;
                return mins != null ? ('Премаркет · до open ' + mins + ' мин') : 'Премаркет';
            }
            if (ph === 'REGULAR') return 'RTH';
            if (ph === 'AFTER_HOURS') return 'After hours';
            if (ph === 'CLOSED') return 'Закрыто';
            return ph || '';
        }
        function forecastRegimeRu(regime) {
            var m = {
                aligned_bullish: 'гэп и дневка согласны ↑',
                aligned_bearish: 'гэп и дневка согласны ↓',
                gap_fade_risk: 'риск fade гэпа',
                gap_reversal_opportunity: 'возможность разворота после гэпа',
                gap_driven: 'режим: гэп',
                multiday_driven: 'режим: дневка',
                neutral_or_unavailable: 'нейтрально'
            };
            return m[String(regime || '')] || regime || '';
        }
        function renderForecastCompact(c) {
            var fc = c.price_forecast_5m;
            if (!fc || !Array.isArray(fc.horizons) || !fc.horizons.length) {
                if (c.price_forecast_5m_summary) {
                    return '<div class="forecast-fallback">' + escapeHtml(c.price_forecast_5m_summary) + '</div>';
                }
                return '';
            }
            var compactRows = fc.horizons.map(function(h) {
                var label = h.minutes != null ? String(h.minutes) + 'м' : '—';
                var p50 = h.p50_pct_vs_spot;
                var p50Str = '—';
                if (p50 != null && p50 !== undefined && Number.isFinite(Number(p50))) {
                    var p = Number(p50);
                    p50Str = (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
                }
                var pgt = h.p_price_gt_spot != null ? fmt(h.p_price_gt_spot, 3) : '—';
                return '<tr><td>' + escapeHtml(label) + '</td><td class="num">' + escapeHtml(p50Str) + '</td><td class="num">' + escapeHtml(pgt) + '</td></tr>';
            }).join('');
            var fullRows = fc.horizons.map(function(h) {
                var label = h.minutes != null ? String(h.minutes) + 'м' : '—';
                function pctCell(v) {
                    if (v == null || v === undefined) return '<td class="num">—</td>';
                    var s = (Number(v) >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';
                    return '<td class="num">' + escapeHtml(s) + '</td>';
                }
                var pgt = h.p_price_gt_spot != null ? fmt(h.p_price_gt_spot, 3) : '—';
                return '<tr><td>' + escapeHtml(label) + '</td>' +
                    pctCell(h.p10_pct_vs_spot) + pctCell(h.p50_pct_vs_spot) + pctCell(h.p90_pct_vs_spot) +
                    '<td class="num">' + escapeHtml(pgt) + '</td></tr>';
            }).join('');
            return '<table class="forecast-table" role="table"><thead><tr>' +
                '<th>Горизонт</th><th>p50</th><th>P(&gt;spot)</th></tr></thead><tbody>' + compactRows + '</tbody></table>' +
                renderDetails('Полный прогноз 30/60/120м (p10/p90)',
                    '<table class="forecast-table" role="table"><thead><tr><th>Горизонт</th><th>p10</th><th>p50</th><th>p90</th><th>P(&gt;spot)</th></tr></thead><tbody>' +
                    fullRows + '</tbody></table><p><strong>p50</strong> — центральный сценарий; <strong>p10/p90</strong> — хвосты.</p>');
        }
        function gapModelSourceHint(src) {
            src = String(src || '').toLowerCase();
            if (src === 'pooled_ridge_v1' || src === 'pooled_ridge_v2') return 'pooled ridge (PM + sector + тикер)';
            if (src === 'ticker_ols_v2_premarket_blend') return 'OLS v2 + премаркет';
            if (src === 'ticker_ols_v2' || src === 'ticker_ols') return 'OLS v2 по тикеру';
            if (src === 'sector_proxy') return 'прокси SMH';
            return src || '';
        }
        function gapEffectiveSourceHint(src) {
            src = String(src || '').toLowerCase();
            if (src === 'premarket_baseline') return 'policy auto: baseline (PM), пока ML не обгоняет MAE';
            if (src === 'ml_open_gap') return 'policy auto: ML open';
            return gapModelSourceHint(src);
        }
        function renderGapPctRow(label, v, title, accent) {
            if (v == null || v === undefined || isNaN(Number(v))) return '';
            var n = Number(v);
            var cls = n >= 0 ? 'positive' : 'negative';
            var rowCls = accent ? 'row accent-row' : 'row';
            var titleAttr = title ? ' title="' + escapeHtml(title) + '"' : '';
            return '<div class="' + rowCls + '"><span class="label">' + escapeHtml(label) + '</span><span class="value ' + cls + '"' + titleAttr + '>' +
                (n >= 0 ? '+' : '') + fmt(n, 2) + '%</span></div>';
        }
        function resolveCardOpenGapFields(c) {
            var baseline = c.forecast_open_gap_baseline_pct;
            if (baseline == null) baseline = c.ticker_open_gap_observable_baseline_pct;
            if (baseline == null) baseline = c.premarket_gap_pct;
            var ml = c.forecast_open_gap_ml_advisory_pct;
            if (ml == null) ml = c.ticker_open_gap_ml_advisory_pct;
            if (ml == null) ml = c.ticker_open_gap_predicted_pct;
            var effective = c.forecast_open_gap_pct;
            var fact = c.ticker_open_gap_fact_pct;
            if (fact == null) fact = c.forecast_open_gap_fact_pct;
            if (fact == null && !isPremarketPhase(c) && c.rth_open_gap_pct != null) fact = c.rth_open_gap_pct;
            return {
                baseline: baseline,
                ml: ml,
                effective: effective,
                effSrc: c.forecast_open_gap_source || '',
                mlSrc: c.ticker_open_gap_ml_advisory_source || c.ticker_open_gap_predicted_source || '',
                fact: fact,
                factBasis: c.ticker_open_gap_fact_basis || (fact != null && !isPremarketPhase(c) ? 'open_9_30_et' : '')
            };
        }
        function renderSessionGapBlock(c) {
            var g = resolveCardOpenGapFields(c);
            if (g.baseline == null && g.ml == null && g.effective == null && g.fact == null) return '';
            var pm = isPremarketPhase(c);
            var html = '<div class="block-title">Гэп на open</div>';
            if (pm) {
                html += renderGapPctRow('Baseline→open', g.baseline, 'Naive baseline: PM-цена к вчерашнему close', false);
                html += renderGapPctRow('ML open', g.ml, gapModelSourceHint(g.mlSrc), false);
                html += renderGapPctRow('Effective→open', g.effective, gapEffectiveSourceHint(g.effSrc), true);
            } else {
                html += renderGapPctRow('Effective→open', g.effective, gapEffectiveSourceHint(g.effSrc), true);
                if (g.fact != null && g.fact !== undefined && !isNaN(Number(g.fact))) {
                    var factLbl = g.factBasis === 'premarket' ? 'Факт (премаркет)' : 'RTH open gap';
                    html += renderGapPctRow(factLbl, g.fact, 'Реальный гэп первого RTH-бара 9:30 ET', false);
                    if (g.ml != null && g.ml !== undefined && !isNaN(Number(g.ml))) {
                        var err = Number(g.fact) - Number(g.ml);
                        html += '<div class="row"><span class="label">ML error</span><span class="value muted" style="font-size:0.78rem;" title="Факт open минус ML open">' +
                            (err >= 0 ? '+' : '') + fmt(err, 2) + ' п.п.</span></div>';
                    }
                }
                var snapParts = [];
                if (g.baseline != null) snapParts.push(renderGapPctRow('Baseline→open', g.baseline, '', false));
                if (g.ml != null) snapParts.push(renderGapPctRow('ML open', g.ml, gapModelSourceHint(g.mlSrc), false));
                if (snapParts.length) html += renderDetails('Утренний снимок (baseline / ML)', snapParts.join(''));
            }
            var regime = forecastRegimeRu(c.forecast_regime);
            if (regime) html += '<div class="regime-line">' + escapeHtml(regime) + '</div>';
            return html;
        }
        function renderMultidayCompact(c) {
            var fc = c.log_return_multiday_forecast;
            var hasFlat = c.multiday_lr_horizon_1d_pct_vs_spot != null || c.multiday_lr_horizon_2d_pct_vs_spot != null || c.multiday_lr_horizon_3d_pct_vs_spot != null;
            if ((!fc || !fc.horizons) && !hasFlat) {
                if (c.log_return_multiday_forecast_summary) {
                    return '<div class="forecast-fallback">' + escapeHtml(c.log_return_multiday_forecast_summary) + '</div>';
                }
                return '';
            }
            var keys = ['1', '2', '3'];
            var flatMap = { '1': c.multiday_lr_horizon_1d_pct_vs_spot, '2': c.multiday_lr_horizon_2d_pct_vs_spot, '3': c.multiday_lr_horizon_3d_pct_vs_spot };
            var rows = [];
            for (var i = 0; i < keys.length; i++) {
                var k = keys[i];
                var pct = flatMap[k];
                if (pct == null && fc && fc.horizons && fc.horizons[k]) pct = fc.horizons[k].predicted_pct_vs_spot;
                if (pct == null && pct !== 0) continue;
                var pctStr = '—';
                if (pct != null && Number.isFinite(Number(pct))) {
                    var p = Number(pct);
                    pctStr = (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
                }
                rows.push('<tr><td>' + escapeHtml(k + ' торг. дн.') + '</td><td class="num">' + escapeHtml(pctStr) + '</td></tr>');
            }
            if (!rows.length) return '';
            var biasLine = c.multiday_lr_bias ? '<div class="regime-line">bias: ' + escapeHtml(String(c.multiday_lr_bias)) + '</div>' : '';
            var detailParts = [];
            if (fc && fc.horizons) {
                var logRows = keys.map(function(k) {
                    var h = fc.horizons[k];
                    if (!h) return '';
                    var predLog = h.predicted_log_ret;
                    var logStr = '—';
                    if (predLog != null && Number.isFinite(Number(predLog))) {
                        var l = Number(predLog);
                        logStr = (l >= 0 ? '+' : '') + l.toFixed(4);
                    }
                    return '<tr><td>' + escapeHtml(k + 'd') + '</td><td class="num">' + escapeHtml(logStr) + '</td></tr>';
                }).filter(Boolean).join('');
                if (logRows) {
                    detailParts.push('<table class="forecast-table"><thead><tr><th>Горизонт</th><th>log-ret</th></tr></thead><tbody>' + logRows + '</tbody></table>');
                }
            }
            var meta = [];
            if (c.multiday_lr_daily_close_source) meta.push('дневка: ' + escapeHtml(String(c.multiday_lr_daily_close_source)));
            if (fc && fc.daily_last_date) meta.push('посл. день: ' + escapeHtml(String(fc.daily_last_date)));
            if (meta.length) detailParts.push('<p class="muted">' + meta.join(' · ') + '</p>');
            var details = detailParts.length ? renderDetails('Детали дневной модели', detailParts.join('')) : '';
            return biasLine + '<table class="forecast-table" role="table"><thead><tr><th>Горизонт</th><th>К spot</th></tr></thead><tbody>' +
                rows.join('') + '</tbody></table>' + details;
        }
        function renderDecisionVerdict(c) {
            var v = c.decision_verdict;
            if (!v || typeof v !== 'object') return '';
            var reasons = Array.isArray(v.primary_reasons) ? v.primary_reasons.slice(0, 2) : [];
            var label = v.label || 'Hold';
            var eff = v.effective_decision || effectiveDecision(c);
            var projected = v.projected_effective_if_resolve || c.decision_stack_projected_effective;
            var html = '<div class="verdict-block">';
            html += '<div><span class="muted">Вердикт</span> <span class="verdict-label">' + escapeHtml(label) + '</span>';
            html += ' · итог <code>' + escapeHtml(String(eff)) + '</code>';
            if (projected && projected !== eff) {
                html += ' · тень <code>' + escapeHtml(String(projected)) + '</code>';
            }
            if (v.resolve_divergence) html += ' <span class="negative">расхождение</span>';
            html += '</div>';
            if (reasons.length) {
                html += '<div class="verdict-reason">' + reasons.map(escapeHtml).join('<br>') + '</div>';
            }
            html += '</div>';
            return html;
        }
        function renderGateChips(c) {
            var chips = [];
            if (c.open_guard_triggered) {
                var og = 'Open guard';
                if (c.open_guard_bar_range_pct != null) og += ' · бар ' + fmt(c.open_guard_bar_range_pct, 2) + '%';
                if (c.open_guard_prev_decision && c.open_guard_next_decision) {
                    og += ' · ' + c.open_guard_prev_decision + '→' + c.open_guard_next_decision;
                }
                chips.push('<span class="gate-chip warn">' + escapeHtml(og) + '</span>');
            }
            if (c.multiday_lr_entry_gate_applied || c.multiday_lr_entry_gate_would_hold) {
                var mg = 'Multiday gate';
                if (c.multiday_lr_entry_gate_status) mg += ' · ' + c.multiday_lr_entry_gate_status;
                if (c.multiday_lr_entry_gate_note) mg += ' — ' + String(c.multiday_lr_entry_gate_note).slice(0, 80);
                chips.push('<span class="gate-chip warn">' + escapeHtml(mg) + '</span>');
            }
            if (c.entry_quality_guard_triggered) {
                var eq = 'Entry quality';
                if (c.entry_quality_guard_reason) eq += ' · ' + String(c.entry_quality_guard_reason).slice(0, 60);
                chips.push('<span class="gate-chip warn">' + escapeHtml(eq) + '</span>');
            }
            var core = coreDecision(c);
            var effTech = c.technical_decision_effective;
            if (c.catboost_signal_status && core && effTech && core !== effTech) {
                var cb = 'CatBoost · ' + core + '→' + effTech;
                if (c.catboost_entry_proba_good != null) cb += ' · P=' + fmt(c.catboost_entry_proba_good, 3);
                chips.push('<span class="gate-chip">' + escapeHtml(cb) + '</span>');
            }
            var snap = c.decision_snapshot;
            var eti = snap && snap.earnings_trust_impact;
            if (eti && eti.active) {
                var et = 'Earnings trust';
                if (eti.runtime_role) et += ' · ' + eti.runtime_role;
                if (eti.action) et += ' · ' + eti.action;
                if (eti.strength != null) et += ' · s=' + fmt(eti.strength, 2);
                if (eti.changed_projected_resolve) et += ' · projected→HOLD';
                else if (eti.shadow_would_hold_if_core_bull) et += ' · shadow HOLD';
                var etCls = (eti.action === 'downgrade' && eti.gate_mode === 'apply') ? ' warn' : '';
                chips.push('<span class="gate-chip' + etCls + '">' + escapeHtml(et) + '</span>');
            }
            var opts = c.options_sentiment;
            if (opts && opts.status === 'ok' && opts.gate_hint === 'would_downgrade') {
                chips.push('<span class="gate-chip warn">Options shadow ↓</span>');
            } else if (opts && opts.status === 'ok' && opts.gate_hint === 'would_signal') {
                chips.push('<span class="gate-chip ok">Options shadow ↑</span>');
            }
            if (!chips.length) return '';
            return '<div class="gate-row">' + chips.join('') + '</div>';
        }
        function renderMlShadowBlock(c) {
            var e3 = c.ml_entry_e3;
            var h3 = c.ml_hold_h3;
            if (!e3 && !h3) return '';
            var html = '<div class="block-title">ML shadow</div><div class="ml-shadow-block">';
            if (e3) {
                var e3cls = e3.would_enter === true ? 'positive' : (e3.would_enter === false ? 'negative' : 'muted');
                html += '<div class="row"><span class="label">Вход E3</span><span class="value ' + e3cls + '">' + escapeHtml(e3.label_ru || '—') + '</span></div>';
                if (e3.detail_ru) {
                    html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.78rem;">' + escapeHtml(e3.detail_ru) + '</span></div>';
                }
            }
            if (h3) {
                var h3cls = h3.would_defer_exit === true ? 'positive' : (h3.would_defer_exit === false ? 'negative' : 'muted');
                html += '<div class="row"><span class="label">Удержание H3</span><span class="value ' + h3cls + '">' + escapeHtml(h3.label_ru || '—') + '</span></div>';
                if (h3.detail_ru) {
                    var agree = h3.would_defer_exit ? 'согласен с удержанием' : 'за выход';
                    html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.78rem;">' + escapeHtml(h3.detail_ru + ' · ' + agree) + '</span></div>';
                }
                if (c.open_position_pnl_pct != null) {
                    var pnlCls = Number(c.open_position_pnl_pct) >= 0 ? 'positive' : 'negative';
                    html += '<div class="row"><span class="label">PnL позиции</span><span class="value ' + pnlCls + '">' + fmt(c.open_position_pnl_pct, 2) + '%</span></div>';
                }
            }
            html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.72rem;">telemetry only — сделки не меняет</span></div>';
            html += '</div>';
            return html;
        }
        function renderOptionsSentimentBlock(c) {
            var o = c.options_sentiment;
            if (!o || typeof o !== 'object') return '';
            var html = '<div class="block-title">Options (Polygon)</div><div class="ml-shadow-block">';
            if (o.status !== 'ok') {
                html += '<div class="row"><span class="label">Статус</span><span class="value muted">' + escapeHtml(o.error || o.status || '—') + '</span></div></div>';
                return html;
            }
            var lbl = o.sentiment_label || '—';
            var lblCls = lbl === 'BULLISH' ? 'positive' : (lbl === 'BEARISH' ? 'negative' : '');
            html += '<div class="row"><span class="label">Сентимент</span><span class="value ' + lblCls + '">' +
                escapeHtml(lbl) + ' · ' + fmt(o.sentiment_score, 2) + '</span></div>';
            if (o.pcr_volume != null) {
                html += '<div class="row"><span class="label">PCR vol</span><span class="value">' + fmt(o.pcr_volume, 2) + '</span></div>';
            }
            if (o.max_pain_strike != null) {
                html += '<div class="row"><span class="label">Max pain</span><span class="value">' + fmt(o.max_pain_strike, 0) + '</span></div>';
            }
            var hintMap = { would_downgrade: 'shadow ↓ BUY', would_signal: 'shadow ↑', neutral: 'нейтрально', unavailable: '—' };
            var hint = o.gate_hint || 'neutral';
            var hintRu = hintMap[hint] || hint;
            var hintCls = hint === 'would_downgrade' ? 'negative' : (hint === 'would_signal' ? 'positive' : 'muted');
            html += '<div class="row"><span class="label">Gate</span><span class="value ' + hintCls + '" style="font-size:0.78rem;">' + escapeHtml(hintRu) + '</span></div>';
            if (o.one_liner_ru) {
                html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.76rem;">' +
                    escapeHtml(String(o.one_liner_ru).slice(0, 220)) + '</span></div>';
            }
            html += '<div class="chart-link"><a href="/options/map?ticker=' + encodeURIComponent(c.ticker) + '" target="_blank">Money Map →</a></div>';
            html += '</div>';
            return html;
        }
        function renderEntryBlock(c) {
            var advice = c.entry_advice || '—';
            var adviceCls = advice === 'ALLOW' ? 'positive' : (advice === 'AVOID' ? 'negative' : '');
            var html = '<div class="block-title">Вход</div>';
            html += '<div class="row"><span class="label">Совет</span><span class="value ' + adviceCls + '">' + escapeHtml(advice) + '</span></div>';
            var localReason = (c.entry_advice_reason_local != null && String(c.entry_advice_reason_local).trim())
                ? String(c.entry_advice_reason_local).trim() : '';
            if (!localReason && c.entry_advice_reason && (!c.macro_risk_level || c.macro_risk_level === 'NEUTRAL')) {
                localReason = String(c.entry_advice_reason).trim();
            }
            if (localReason && advice !== 'ALLOW') {
                html += '<div class="row"><span class="label"></span><span class="value muted" style="font-size:0.78rem;">' + escapeHtml(localReason) + '</span></div>';
            }
            if (c.kb_news_impact) {
                html += '<div class="row"><span class="label">Новости</span><span class="value muted" style="font-size:0.78rem;">' + escapeHtml(String(c.kb_news_impact)) + '</span></div>';
            }
            return html;
        }
        function renderChecklistCompact(c) {
            var rr = c.risk_reward_ratio;
            var ev = c.expected_value_pct;
            if (rr == null && ev == null && !c.qwen_checklist_verdict) return '';
            var rrOk = rr != null && rr >= 2.0;
            var evOk = ev != null && ev > 0;
            var parts = [];
            if (rr != null) {
                parts.push('R:R 1:' + fmt(rr, 1) + ' <span class="' + (rrOk ? 'ok' : 'bad') + '">' + (rrOk ? '✓' : '✗') + '</span>');
            }
            if (ev != null) {
                parts.push('EV ' + (ev >= 0 ? '+' : '') + fmt(ev, 2) + '% <span class="' + (evOk ? 'ok' : 'bad') + '">' + (evOk ? '✓' : '✗') + '</span>');
            }
            var html = '<div class="checklist-line">' + parts.join(' · ') + '</div>';
            if (c.qwen_checklist_verdict) {
                html += renderDetails('Вывод чек-листа', '<p>' + escapeHtml(c.qwen_checklist_verdict) + '</p>');
            }
            return html;
        }
        function renderTradeBlock(c) {
            var upside = c.estimated_upside_pct_day != null ? c.estimated_upside_pct_day : c.take_profit_pct;
            var stopEnabled = c.stop_loss_enabled === true;
            var html = '<div class="block-title">Сделка</div>';
            html += '<div class="row"><span class="label">Цена</span><span class="value">' + fmt(c.price, 2) + '</span></div>';
            if (c.suggested_take_profit_price != null) {
                html += '<div class="row"><span class="label">Цель</span><span class="value positive">' + fmt(c.suggested_take_profit_price, 2) + '</span></div>';
            }
            if (upside != null) {
                html += '<div class="row accent-row"><span class="label" title="Тейк после пола 4% и cap">Upside</span><span class="value positive">+' + fmt(upside, 1) + '%</span></div>';
            }
            if (c.estimated_downside_pct_day != null) {
                html += '<div class="row"><span class="label" title="Оценка просадки">Downside</span><span class="value negative">−' + fmt(c.estimated_downside_pct_day, 1) + '%</span></div>';
            }
            if (stopEnabled && c.stop_loss_pct != null) {
                html += '<div class="row"><span class="label">Стоп (правило)</span><span class="value negative">−' + fmt(c.stop_loss_pct, 1) + '%</span></div>';
            }
            html += renderChecklistCompact(c);
            return html;
        }
        function renderIntradayBlock(c) {
            var html = '<div class="block-title">Intraday</div>';
            html += '<div class="row"><span class="label">RSI(5m)</span><span class="value">' + fmt(c.rsi_5m, 1) + '</span></div>';
            var momLabel = (c.momentum_window_min != null && c.momentum_window_min > 0 && c.momentum_window_min < 120)
                ? ('Импульс ' + c.momentum_window_min + 'м')
                : 'Импульс 2ч';
            html += '<div class="row"><span class="label">' + momLabel + '</span><span class="value">' + fmt(c.momentum_2h_pct, 2) + '%</span></div>';
            if (c.pullback_from_high_pct != null) {
                html += '<div class="row"><span class="label">Откат от хая</span><span class="value">' + fmt(c.pullback_from_high_pct, 2) + '%</span></div>';
            }
            if (c.volatility_5m_pct != null) {
                html += '<div class="row"><span class="label">Vol 5m</span><span class="value">' + fmt(c.volatility_5m_pct, 2) + '%</span></div>';
            }
            return html;
        }
        function renderMacroBlock(c) {
            if (!c.macro_risk_level || c.macro_risk_level === 'NEUTRAL') return '';
            var macroLine = escapeHtml(String(c.macro_risk_level));
            if (c.macro_equity_gap_bias) macroLine += ' · ' + escapeHtml(String(c.macro_equity_gap_bias));
            var macroReasons = Array.isArray(c.macro_risk_reasons) ? c.macro_risk_reasons : [];
            if (macroReasons.length) macroLine += ' — ' + escapeHtml(macroReasons.slice(0, 2).join('; '));
            if (c.macro_predicted_sector_gap_pct != null && c.macro_sector_proxy) {
                macroLine += '; сектор ' + escapeHtml(String(c.macro_sector_proxy)) + ' '
                    + (Number(c.macro_predicted_sector_gap_pct) >= 0 ? '+' : '')
                    + escapeHtml(String(c.macro_predicted_sector_gap_pct)) + '%';
            }
            return '<div class="block-title">Макро</div><div class="row"><span class="label">Риск</span><span class="value muted" style="font-size:0.85rem;">' + macroLine + '</span></div>';
        }
        function renderEntryStory(c) {
            var parts = [];
            if (c.entry_condition) parts.push('<p><strong>Условие:</strong> ' + escapeHtml(String(c.entry_condition)) + '</p>');
            if (c.entry_intuition) parts.push('<p><strong>Интуиция:</strong> ' + escapeHtml(String(c.entry_intuition)) + '</p>');
            if (c.reasoning) parts.push('<p>' + escapeHtml(String(c.reasoning).slice(0, 350)) + '</p>');
            if (!parts.length) return '';
            return renderDetails('Почему такой сигнал', parts.join(''));
        }
        function renderCard(c) {
            var isNoData = c.decision === 'NO_DATA';
            var eff = effectiveDecision(c);
            var core = coreDecision(c);
            var html = '<div class="card-5m ' + decisionClass(eff) + '" data-ticker="' + escapeHtml(c.ticker) + '">';
            html += '<div class="card-head"><div><span class="ticker">' + escapeHtml(c.ticker) + '</span>';
            var sess = sessionPhaseRu(c);
            if (sess) {
                html += '<div class="head-badges" style="margin-top:0.25rem;">';
                html += '<span class="badge-session' + (isPremarketPhase(c) ? ' pm' : '') + '">' + escapeHtml(sess) + '</span>';
                if (c.is_preliminary) html += '<span class="badge-prelim">preliminary</span>';
                html += '</div>';
            }
            html += '</div><span class="decision ' + escapeHtml(String(eff)) + '">' + escapeHtml(String(eff)) + '</span></div>';
            if (core !== eff) {
                html += '<div class="decision-sub">core: ' + escapeHtml(String(core)) + ' → effective: ' + escapeHtml(String(eff)) + '</div>';
            }
            if (isNoData) {
                html += '<p class="no-data">' + escapeHtml(c.reasoning || 'Нет данных') + '</p></div>';
                return html;
            }
            html += renderDecisionVerdict(c);
            html += renderGateChips(c);
            html += renderEntryBlock(c);
            html += renderOptionsSentimentBlock(c);
            html += renderMlShadowBlock(c);
            html += renderTradeBlock(c);
            html += renderSessionGapBlock(c);
            html += renderIntradayBlock(c);
            var fcBlock = renderForecastCompact(c);
            if (fcBlock) {
                html += '<div class="block-title">Прогноз 30/60/120м</div>';
                html += fcBlock;
            }
            var mlrBlock = renderMultidayCompact(c);
            if (mlrBlock) {
                html += '<div class="block-title">Дневка 1–3 торг. дня</div>';
                html += mlrBlock;
            } else if (c.multiday_lr_forecast_unavailable) {
                html += '<div class="block-title">Дневка 1–3 торг. дня</div>';
                var why = c.multiday_lr_forecast_error ? escapeHtml(String(c.multiday_lr_forecast_error)) : 'Нет прогноза (мало валидных дневных строк / Yahoo).';
                html += '<div class="forecast-fallback muted">' + why + '</div>';
            }
            html += renderMacroBlock(c);
            html += renderEntryStory(c);
            if (LSE_WEB_LLM_ENABLED) {
                html += '<a class="btn llm-btn" href="/api/game5m/card/' + encodeURIComponent(c.ticker) + '/llm.html" target="_blank" rel="noopener">Вывод LLM</a>';
            }
            html += '<div class="chart-link"><a href="/visualization?ticker=' + encodeURIComponent(c.ticker) + '" target="_blank">График 5m</a></div>';
            html += '</div>';
            return html;
        }
        async function loadCards(silent) {
            const container = document.getElementById('cardsContainer');
            const updatedEl = document.getElementById('updatedAt');
            if (!silent) container.innerHTML = '<div class="loading-llm" style="padding:1rem;">Загрузка…</div>';
            try {
                const r = await fetch('/api/game5m/cards?days=5&_=' + Date.now(), { cache: 'no-store' });
                if (!r.ok) { container.innerHTML = '<div style="color:#fca5a5;">Ошибка ' + r.status + '</div>'; return; }
                const data = await r.json();
                if (typeof data.web_llm_enabled === 'boolean') {
                    LSE_WEB_LLM_ENABLED = data.web_llm_enabled;
                }
                updatedEl.textContent = data.updated_at ? new Date(data.updated_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '—';
                container.innerHTML = (data.cards || []).map(renderCard).join('');
            } catch (e) {
                container.innerHTML = '<div style="color:#fca5a5;">' + escapeHtml(e.message) + '</div>';
            }
            return Promise.resolve();
        }
        document.getElementById('refreshBtn').addEventListener('click', function() {
            loadCards(false).then(function() { scheduleAutoRefresh(); });
        });
        document.getElementById('autoRefresh').addEventListener('change', scheduleAutoRefresh);
        loadCards(false).then(function() { scheduleAutoRefresh(); });
    </script>
</body>
</html>
