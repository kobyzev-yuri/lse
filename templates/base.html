<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}LSE Trading System{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eaeaea;
            padding: 0 0 2rem;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .navbar {
            position: sticky;
            top: 0;
            background: #16213e;
            padding: 0.6rem 0.8rem;
            z-index: 10;
            border-bottom: 1px solid #0f3460;
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            align-items: center;
        }
        .navbar a {
            color: #7dd3fc;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.35rem 0.5rem;
            border-radius: 6px;
        }
        .navbar a:hover, .navbar a:focus { background: #0f3460; color: #e2e8f0; }
        .container { padding: 0.8rem; }
        .card {
            background: #16213e;
            border-radius: 10px;
            padding: 0.9rem 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #475569;
        }
        .card h1 { font-size: 1.15rem; margin-bottom: 0.6rem; color: #e2e8f0; }
        .card h2 { font-size: 1rem; margin-bottom: 0.5rem; color: #cbd5e1; }
        .card h3 { font-size: 0.95rem; margin-bottom: 0.4rem; color: #94a3b8; }
        .muted { color: #94a3b8; font-size: 0.85rem; }
        .card p, .card label { font-size: 0.9rem; }
        .card a { color: #7dd3fc; text-decoration: none; }
        .card a:hover { text-decoration: underline; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: #16213e;
            border-radius: 10px;
            padding: 0.8rem;
            border-left: 4px solid #0f3460;
        }
        .stat-card h3 { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; }
        .stat-card .value { font-size: 1.25rem; font-weight: 600; color: #e2e8f0; }
        .stat-card .value.positive { color: #86efac; }
        .stat-card .value.negative { color: #fca5a5; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0.5rem 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        table th, table td { padding: 0.45rem 0.5rem; text-align: left; border-bottom: 1px solid #0f3460; }
        table th { background: #0f172a; color: #94a3b8; font-weight: 600; white-space: nowrap; }
        table td { color: #e2e8f0; }
        table .positive { color: #86efac; }
        table .negative { color: #fca5a5; }
        table pre { margin: 0; font-size: 0.75rem; background: #0f172a; padding: 0.35rem; border-radius: 4px; overflow-x: auto; max-width: 200px; }
        button, .btn {
            background: #0f3460;
            color: #e2e8f0;
            border: none;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button:active, .btn:active { background: #1e3a5f; }
        button:hover:not(:disabled), .btn:hover:not(:disabled) { background: #1e3a5f; }
        button:disabled, .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        button.btn-outline-primary, .btn.btn-outline-primary {
            background: transparent;
            color: #7dd3fc;
            border: 1px solid #0f3460;
        }
        button.btn-sm, .btn.btn-sm { padding: 0.35rem 0.6rem; font-size: 0.8rem; }
        input, select, textarea {
            width: 100%;
            padding: 0.5rem 0.6rem;
            border: 1px solid #0f3460;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            background: #0f172a;
            color: #eaeaea;
        }
        input::placeholder, textarea::placeholder { color: #64748b; }
        label { display: block; margin-bottom: 0.25rem; color: #94a3b8; font-size: 0.85rem; }
        .loading { text-align: center; padding: 1rem; color: #94a3b8; font-size: 0.9rem; }
        .text-center { text-align: center; }
        .text-danger { color: #fca5a5; }
        .text-muted { color: #94a3b8; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; background: #475569; color: #e2e8f0; }
        /* Modal (custom, no Bootstrap) */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: #16213e;
            border-radius: 10px;
            padding: 1rem;
            max-width: 100%;
            width: 420px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #0f3460;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #0f3460;
        }
        .modal-title { font-size: 1rem; font-weight: 600; }
        .modal-close {
            background: transparent;
            border: none;
            color: #94a3b8;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
        }
        .modal-close:hover { color: #e2e8f0; }
        .mb-3 { margin-bottom: 0.75rem; }
        .form-label { margin-bottom: 0.25rem; }
        .dashboard-text { line-height: 1.5; font-size: 0.9rem; }
        .dashboard-text strong { color: #e2e8f0; }
        .dashboard-text em { color: #94a3b8; }
        #dashboardContent.dashboard-text br { display: block; content: ""; margin-top: 0.25rem; }
        canvas { max-width: 100%; display: block; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/">Портфель</a>
        <a href="/trading">Торги</a>
        <a href="/knowledge">База знаний</a>
        <a href="/visualization">Графики</a>
        <a href="/parameters">Параметры</a>
        <a href="/service">Сервис / логи</a>
        <a href="/game5m/cards">5m карточки</a>
        <a href="/reports/pending">Открытые</a>
        <a href="/reports/closed">Закрытые</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
