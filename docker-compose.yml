# LSE на VM: PostgreSQL + один контейнер (бот). Python 3.11 в образе, anaconda не нужна.
# По умолчанию — polling (уже работал). Webhook позже: см. комментарий ниже и docs/MIGRATE_SERVER.md.

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lse_pg_pass}
      POSTGRES_DB: lse_trading
    volumes:
      - lse_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lse_trading"]
      interval: 5s
      timeout: 5s
      retries: 5

  lse:
    build: .
    image: lse-bot:latest
    container_name: lse-bot
    restart: unless-stopped
    # Бот (polling) + веб (карточки 5m, мониторинг) в одном контейнере. Порт 8080 — веб.
    # Для только webhook без веб-страниц замените на: command: ["uvicorn", "api.bot_app:app", ...]
    command: ["sh", "-c", "python scripts/run_telegram_bot.py & exec uvicorn web_app:app --host 0.0.0.0 --port 8080"]
    ports:
      - "8080:8080"
    # config.env с хоста — контейнер всегда видит актуальный файл; после правки достаточно restart.
    # logs — для страницы «Сервис / логи» (чтение хвостов cron). На хосте: mkdir -p logs; cron пишет в PROJECT_DIR/logs.
    volumes:
      - ./config.env:/app/config.env:ro
      - ./logs:/app/logs:ro
    environment:
      TZ: Europe/Moscow
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-lse_pg_pass}@postgres:5432/lse_trading?options=-c%20timezone%3DEurope%2FMoscow
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lse_pgdata:
