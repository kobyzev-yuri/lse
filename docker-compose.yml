# LSE на VM: PostgreSQL + один контейнер (бот). Python 3.11 в образе, anaconda не нужна.
# По умолчанию — polling (уже работал). Webhook позже: см. комментарий ниже и docs/MIGRATE_SERVER.md.

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: lse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lse_pg_pass}
      POSTGRES_DB: lse_trading
    volumes:
      - lse_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lse_trading"]
      interval: 5s
      timeout: 5s
      retries: 5

  lse:
    build: .
    image: lse-bot:latest
    container_name: lse-bot
    restart: unless-stopped
    # Polling (основной режим, уже работал). Для webhook замените на:
    # command: ["uvicorn", "api.bot_app:app", "--host", "0.0.0.0", "--port", "8080"]
    # и добавьте ports: "8080:8080"
    command: ["python", "scripts/run_telegram_bot.py"]
    env_file:
      - config.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-lse_pg_pass}@postgres:5432/lse_trading?options=-c%20timezone%3DEurope%2FMoscow
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lse_pgdata:
